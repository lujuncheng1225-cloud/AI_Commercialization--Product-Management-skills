name: Skill 请求
description: 为仓库提议一个新的 PM skill。
title: "[Skill]: "
labels:
  - skill-request
body:
  - type: input
    id: skill_name
    attributes:
      label: 建议的 skill 名称
    validations:
      required: true
  - type: textarea
    id: trigger
    attributes:
      label: 触发场景
      description: 这个 skill 应该在什么情况下使用？
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: 目标输出
      description: 这个 skill 应该产出什么，或者帮助做什么决策？
    validations:
      required: true
