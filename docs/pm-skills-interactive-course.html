<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM AI 工具箱 — 产品经理的 AI 即用技能库</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FAFAFA; --surface: #FFFFFF; --text: #1a1a2e; --text-secondary: #6b7280;
  --border: #e5e7eb; --accent: #6366f1; --accent-light: #eef2ff;
  --tag-bg: #fef2f2; --tag-text: #e11d48; --prompt-bg: #F8F8FA;
  --shadow: 0 1px 3px rgba(0,0,0,.06); --shadow-hover: 0 8px 24px rgba(0,0,0,.1);
  --radius: 16px; --progress-bar: #6366f1;
}
[data-theme="dark"] {
  --bg: #0a0a0f; --surface: #141420; --text: #e5e7eb; --text-secondary: #9ca3af;
  --border: #1f2937; --accent: #818cf8; --accent-light: #1e1b4b;
  --tag-bg: #1c1028; --tag-text: #f472b6; --prompt-bg: #1a1a2e;
  --shadow: 0 1px 3px rgba(0,0,0,.3); --shadow-hover: 0 8px 24px rgba(0,0,0,.4);
}
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Noto Sans SC", "PingFang SC", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6; transition: background .3s, color .3s;
}

/* ===== Progress Bar ===== */
#progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--progress-bar); z-index: 1000; transition: width .1s; }

/* ===== Header ===== */
.header { max-width: 960px; margin: 0 auto; padding: 80px 24px 0; text-align: center; }
.header h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 8px; }
.header p { color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 32px; }

/* ===== Search ===== */
.search-wrap { max-width: 560px; margin: 0 auto; position: relative; }
.search-wrap input {
  width: 100%; padding: 14px 20px 14px 48px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 1rem; outline: none; transition: border .2s, box-shadow .2s;
}
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
.search-wrap::before { content: "🔍"; position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 1.1rem; }

/* ===== Tags ===== */
.tags { max-width: 960px; margin: 32px auto 0; padding: 0 24px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.tag-btn {
  padding: 6px 16px; border-radius: 100px; border: 1px solid var(--border); background: var(--surface);
  color: var(--text-secondary); font-size: .875rem; cursor: pointer; transition: all .2s; white-space: nowrap;
}
.tag-btn:hover { border-color: var(--accent); color: var(--accent); }
.tag-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

/* ===== Grid ===== */
.grid { max-width: 960px; margin: 40px auto 80px; padding: 0 24px; display: grid; grid-template-columns: 1fr; gap: 16px; }

/* ===== Card ===== */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 24px; box-shadow: var(--shadow); transition: transform .2s, box-shadow .2s;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.scenario-tag {
  font-size: .75rem; font-weight: 600; padding: 2px 10px; border-radius: 100px;
  background: var(--tag-bg); color: var(--tag-text);
}
.level { font-size: .75rem; color: var(--text-secondary); }
.card h3 { font-size: 1.15rem; font-weight: 600; margin-bottom: 4px; }
.card > p { color: var(--text-secondary); font-size: .9rem; margin-bottom: 16px; }

/* ===== Prompt Box ===== */
.prompt-box { position: relative; border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; overflow: hidden; }
.prompt-box pre {
  background: var(--prompt-bg); padding: 16px 60px 16px 16px; font-size: .85rem; line-height: 1.7;
  overflow-x: auto; white-space: pre-wrap; word-break: break-word; font-family: "SF Mono", "Fira Code", monospace;
  color: var(--text); margin: 0;
}
.copy-btn {
  position: absolute; top: 12px; right: 12px; padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-secondary); font-size: .8rem; cursor: pointer; transition: all .2s;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ===== Details ===== */
details { margin-top: 12px; }
details summary {
  cursor: pointer; font-size: .875rem; color: var(--text-secondary); padding: 8px 0;
  list-style: none; display: flex; align-items: center; gap: 6px;
}
details summary::-webkit-details-marker { display: none; }
details summary::before { content: "▸"; transition: transform .2s; display: inline-block; }
details[open] summary::before { transform: rotate(90deg); }
details .example, details ul { padding: 12px 16px; background: var(--prompt-bg); border-radius: 8px; }
details .input-label, details .output-label { font-size: .8rem; font-weight: 600; color: var(--text-secondary); margin-top: 8px; }
details .input-label:first-child { margin-top: 0; }
details .input-text, details .output-text { font-size: .85rem; color: var(--text); margin-top: 2px; }
details ul { list-style: none; }
details ul li { font-size: .85rem; color: var(--text-secondary); padding: 2px 0; }
details ul li::before { content: "• "; color: var(--accent); }

/* ===== Empty State ===== */
.empty { text-align: center; padding: 80px 24px; color: var(--text-secondary); grid-column: 1/-1; }
.empty span { font-size: 2.5rem; display: block; margin-bottom: 12px; }

/* ===== Back to Top ===== */
#back-top {
  position: fixed; bottom: 24px; right: 24px; width: 40px; height: 40px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: translateY(8px); transition: all .3s; font-size: 1.1rem;
}
#back-top.show { opacity: 1; transform: translateY(0); }

/* ===== Theme Toggle ===== */
#theme-toggle {
  position: fixed; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 1rem; z-index: 100;
}

/* ===== Stats ===== */
.stats { max-width: 960px; margin: 24px auto 0; padding: 0 24px; text-align: center; color: var(--text-secondary); font-size: .85rem; }

/* ===== Footer ===== */
.footer { max-width: 960px; margin: 0 auto; padding: 40px 24px 60px; text-align: center; color: var(--text-secondary); font-size: .8rem; border-top: 1px solid var(--border); }

/* ===== Responsive ===== */
@media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 960px) { .grid { grid-template-columns: 1fr 1fr 1fr; } .card:last-child { grid-column: unset; } }

/* ===== PDF ===== */
@media print {
  #progress, #back-top, #theme-toggle, .search-wrap, .tags, .copy-btn, .stats, details, .footer { display: none !important; }
  .grid { grid-template-columns: 1fr; }
  .card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
  body { background: #fff; }
}
</style>
</head>
<body>
<div id="progress"></div>
<button id="theme-toggle" onclick="toggleTheme()" title="切换暗色模式">🌙</button>

<div class="header">
  <h1>PM AI 工具箱</h1>
  <p>产品经理的 AI 即用技能库</p>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="你现在想解决什么问题？" oninput="render()">
  </div>
</div>

<div class="tags" id="tags"></div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<button id="back-top" onclick="window.scrollTo({top:0})">↑</button>

<div class="footer">
  <p>22 个即用场景 · 复制即用 · 持续更新</p>
</div>

    exampleInput: "分析 Notion 的定价策略",

1. ...
2. ...
3. ...

## 5. 行动建议

// ===== 分类列表 =====
const categories = ["全部", "竞品分析", "用户研究", "需求管理", "定价策略", "数据分析", "商业化", "增长策略", "项目沟通", "产品规划"];

let activeCategory = "全部";
const copied = JSON.parse(localStorage.getItem('pm-copied') || '{}');

// ===== 初始化 =====
function init() {
  // 主题
  const saved = localStorage.getItem('pm-theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-toggle').textContent = '☀️';
  }

  renderTags();
  render();
  window.addEventListener('scroll', onScroll);
}

// ===== 渲染标签 =====
function renderTags() {
  const el = document.getElementById('tags');
  el.innerHTML = categories.map(c =>
    `<button class="tag-btn${c === activeCategory ? ' active' : ''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
}

function setCategory(c) {
  activeCategory = c;
  renderTags();
  render();
}

// ===== 渲染卡片 =====
function render() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const grid = document.getElementById('grid');

  const filtered = scenarios.filter(s => {
    if (activeCategory !== '全部' && s.category !== activeCategory) return false;
    if (query) {
      return s.title.toLowerCase().includes(query) ||
             s.desc.toLowerCase().includes(query) ||
             s.prompt.toLowerCase().includes(query) ||
             s.category.toLowerCase().includes(query);
    }
    return true;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><span>🔍</span>没有找到匹配的场景<br>试试换个关键词？</div>';
    document.getElementById('stats').innerHTML = '';
    return;
  }

  grid.innerHTML = filtered.map((s, i) => {
    const id = s.title;
    const isCopied = copied[id];
    return `
    <div class="card">
      <div class="card-header">
        <span class="scenario-tag">${s.category}</span>
        <span class="level">${s.level}</span>
        ${isCopied ? '<span style="font-size:.75rem;color:var(--accent)">✓ 已复制</span>' : ''}
      </div>
      <h3>${s.title}</h3>
      <p>${s.desc}</p>
      <div class="prompt-box">
        <pre>${escapeHtml(s.prompt)}</pre>
        <button class="copy-btn${isCopied ? ' copied' : ''}" onclick="copyPrompt(this, '${escapeAttr(s.title)}')">
          ${isCopied ? '已复制 ✓' : '复制'}
        </button>
      </div>
      <details>
        <summary>▶ 示例</summary>
        <div class="example">
          <div class="input-label">输入：</div>
          <div class="input-text">${s.exampleInput}</div>
        </div>
      </details>
      <details>
        <summary>💡 使用提示</summary>
        <ul>${s.tips.map(t => `<li>${t}</li>`).join('')}</ul>
      </details>
    </div>`;
  }).join('');

  document.getElementById('stats').innerHTML = `共 ${filtered.length} 个场景`;
}

// ===== 复制 =====
function copyPrompt(btn, title) {
  const pre = btn.closest('.prompt-box').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.classList.add('copied');
    btn.textContent = '已复制 ✓';
    copied[title] = true;
    localStorage.setItem('pm-copied', JSON.stringify(copied));
    // also update the card header checkmark
    const card = btn.closest('.card');
    const header = card.querySelector('.card-header');
    if (!header.querySelector('.copied-mark')) {
      const mark = document.createElement('span');
      mark.className = 'copied-mark';
      mark.style.cssText = 'font-size:.75rem;color:var(--accent)';
      mark.textContent = '✓ 已复制';
      header.appendChild(mark);
    }
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '复制'; }, 2000);
  });
}

// ===== 滚动 =====
function onScroll() {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('back-top').classList.toggle('show', h.scrollTop > 400);
}

// ===== 主题 =====
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-toggle').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('pm-theme', isDark ? 'light' : 'dark');
}

// ===== 工具函数 =====
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

init();
</script>
