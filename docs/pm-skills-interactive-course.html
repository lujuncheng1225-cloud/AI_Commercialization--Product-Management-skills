<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PM AI 工具箱 — 产品经理的 Prompt 合集</title>
<style>
:root{--bg:#FAFAFA;--bg-card:#fff;--bg-code:#F5F5F7;--text:#1D1D1F;--text-2:#6E6E73;--text-3:#AEAEB2;--border:#E5E5EA;--shadow:0 1px 3px rgba(0,0,0,.06);--r:16px;--accent:#6C5CE7;--accent-light:#EDE9FE;--accent-hover:#5A4BD1;--mono:'SF Mono',Menlo,Monaco,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif}
[data-theme="dark"]{--bg:#1D1D1F;--bg-card:#2C2C2E;--bg-code:#1C1C1E;--text:#F5F5F7;--text-2:#98989D;--text-3:#636366;--border:#38383A;--shadow:0 1px 3px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
a{color:var(--accent);text-decoration:none}
#progress-bar{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:100;transition:width .1s;width:0}
.nav{position:sticky;top:0;z-index:50;background:color-mix(in srgb, var(--bg) 80%, transparent);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav-logo{font-weight:700;font-size:16px;letter-spacing:-.02em}
.nav-right{display:flex;gap:8px}
.nav-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--text-2);transition:all .2s}
.nav-btn:hover{background:var(--bg-code);color:var(--text)}
.container{max-width:720px;margin:0 auto;padding:24px 16px 80px}
.hero{text-align:center;padding:40px 0 32px}
.hero h1{font-size:28px;font-weight:700;letter-spacing:-.03em;margin-bottom:8px}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--text-2);font-size:15px}
.search-box{margin:24px 0 16px;position:relative}
.search-box input{width:100%;padding:14px 16px 14px 44px;border:1px solid var(--border);border-radius:12px;background:var(--bg-card);font-size:15px;color:var(--text);outline:none;transition:border .2s,box-shadow .2s}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,92,231,.1)}
.search-box input::placeholder{color:var(--text-3)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
.tag-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;font-size:13px;cursor:pointer;color:var(--text-2);transition:all .2s;white-space:nowrap}
.tag-btn:hover{border-color:var(--accent);color:var(--accent)}
.tag-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.module-label{font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin:32px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.module-label:first-of-type{margin-top:0}
.card{background:var(--bg-card);border-radius:var(--r);border:1px solid var(--border);padding:24px;margin-bottom:16px;box-shadow:var(--shadow);transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
[data-theme="dark"] .card:hover{box-shadow:0 4px 12px rgba(0,0,0,.4)}
.card-header{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.module-tag{padding:2px 10px;border-radius:6px;font-size:12px;font-weight:500;background:var(--accent-light);color:var(--accent)}
.level-tag{padding:2px 10px;border-radius:6px;font-size:12px;font-weight:500;background:var(--bg-code);color:var(--text-2)}
.time-tag{padding:2px 10px;border-radius:6px;font-size:12px;font-weight:500;background:var(--bg-code);color:var(--text-3);margin-left:auto}
.card h3{font-size:17px;font-weight:600;margin-bottom:4px;letter-spacing:-.01em}
.card-desc{font-size:14px;color:var(--text-2);margin-bottom:16px}
.prompt-box{position:relative;background:var(--bg-code);border-radius:10px;overflow:hidden}
.prompt-box pre{padding:16px 56px 16px 16px;font-family:var(--mono);font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;color:var(--text);margin:0}
.copy-btn{position:absolute;top:8px;right:8px;padding:5px 12px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.copy-btn:hover{background:var(--accent-hover)}
.copy-btn.copied{background:#10B981}
details{margin-top:12px}
details summary{font-size:13px;color:var(--text-2);cursor:pointer;padding:6px 0;user-select:none}
details summary:hover{color:var(--text)}
.example{margin-top:8px;padding:12px;background:var(--bg-code);border-radius:8px;font-size:13px}
.example .label{font-weight:600;color:var(--text-2);font-size:12px;display:block;margin-bottom:4px}
.example .example-input{margin-bottom:8px}
.example .example-output pre{font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;background:none;padding:0;margin:0;color:var(--text)}
.principle{margin-top:8px;padding:12px;background:var(--bg-code);border-radius:8px;font-size:13px;color:var(--text-2);line-height:1.7}
.related{margin-top:12px;font-size:12px;color:var(--text-3)}
.related a{color:var(--text-2);margin:0 4px;cursor:pointer}
.related a:hover{color:var(--accent)}
#back-top{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.2);display:none;align-items:center;justify-content:center}
#back-top:hover{background:var(--accent-hover)}
.no-result{text-align:center;padding:60px 0;color:var(--text-3);font-size:15px;display:none}
.footer{text-align:center;padding:40px 0 20px;color:var(--text-3);font-size:12px}
@media(max-width:640px){.container{padding:16px 12px 60px}.hero h1{font-size:22px}.card{padding:18px}.prompt-box pre{font-size:12px}.nav{padding:10px 16px}}
@media print{.nav,#back-top,.search-box,.tags{display:none!important}.card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}}
</style>
</head>
<body>
<div id="progress-bar"></div>
<nav class="nav">
  <div class="nav-left"><span class="nav-logo">☕ PM AI 工具箱</span></div>
  <div class="nav-right">
    <button class="nav-btn" id="theme-toggle">🌙</button>
    <button class="nav-btn" onclick="window.print()">📄 PDF</button>
  </div>
</nav>
<div class="container">
  <div class="hero">
    <h1>产品经理的 <span>Prompt 合集</span></h1>
    <p>16 个开箱即用的 AI 提示词，覆盖 PM 高频场景。复制即用。</p>
  </div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="你想让 AI 帮你做什么？" autocomplete="off">
  </div>
  <div class="tags" id="tags"></div>
  <div id="cards"></div>
  <div class="no-result" id="no-result">没有匹配的场景</div>
  <div class="footer">☕ PM AI 工具箱 · 用完即走</div>
</div>
<button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
var M={
  '基础':{label:'提示词基础'},
  '角色':{label:'角色定义'},
  '上下文':{label:'上下文工程'},
  '输出':{label:'结构化输出'},
  '多轮':{label:'多轮对话'},
  '调优':{label:'提示词调优'},
  '协作':{label:'AI 协作工作流'},
  '高级':{label:'高级技巧'}
};

var S=[
{id:'format-output',m:'基础',lv:'入门',t:'30s',title:'让 AI 按你的格式输出',desc:'指定输出格式，让 AI 生成结构化内容，告别一大段文字',
prompt:'你是一位产品经理助手。\n\n请帮我完成以下任务：\n\n**任务**：{{你的任务，如"整理以下用户反馈"}}\n\n**输入**：\n{{粘贴你的输入内容}}\n\n**输出要求**：\n1. 使用 Markdown 格式\n2. 用表格呈现核心数据\n3. 每个结论标注置信度（高/中/低）\n4. 最后给 3 条可执行的下一步建议\n5. 控制在 500 字以内',
exIn:'帮我整理这周收到的用户反馈：1）希望增加批量导出 2）编辑器加载太慢 3）能不能加个模板库 4）付费后还是有限制 5）移动端体验很差 6）希望能自定义主题色',
exOut:'| 类别 | 反馈 | 频次 | 置信度 |\n|------|------|------|--------|\n| 功能缺失 | 批量导出 | 2次 | 高 |\n| 性能 | 加载慢 | 1次 | 高 |\n| 新需求 | 模板库 | 1次 | 中 |\n| 定价 | 付费限制 | 1次 | 中 |\n| 体验 | 移动端差 | 1次 | 高 |\n\n🔴 P0：优化移动端+加载性能\n🟡 P1：评估批量导出需求\n🟢 P2：模板库 MVP',
why:'格式约束是提升输出质量最简单的方法。告诉 AI "用表格""标注置信度""控制在500字"，输出立刻从"一堆话"变成"可用的文档"。越具体的格式要求，输出越可控。',
rel:['role-expert','fuzzy-to-precise']},

{id:'role-expert',m:'基础',lv:'入门',t:'1m',title:'让 AI 扮演专家角色',desc:'通过角色定义提升输出质量，让 AI 用专业思维框架回答',
prompt:'你是一位{{专家角色，如"10年经验的数据产品经理"}}。\n\n**背景**：{{你的问题背景，1-2 句}}\n\n**问题**：{{具体问题}}\n\n请从以下角度分析：\n1. {{维度1，如"数据层面"}}\n2. {{维度2，如"产品策略层面"}}\n3. {{维度3，如"落地执行层面"}}\n\n给出具体可执行的建议，避免泛泛而谈。',
exIn:'你是一位10年经验的增长产品经理。我们的产品是 AI 图片工具，月活50万，付费率6%，想提升到10%。免费版功能多，付费版只多了批量处理和去水印。',
exOut:'1. 数据层面：付费率 6%→10% 需新增约2万付费用户。关键卡点在"免费版够用"。\n\n2. 产品策略：\n- 免费版：每天5次生成（从无限削减）\n- 付费版：无限+批量+API\n\n3. 执行层面（90天）：\nWeek 1-2 埋点+基线 → Week 3-4 AB测试 → Month 2 新付费层级 → Month 3 优化 onboarding',
why:'角色定义是最简单有效的技巧。"10年经验的增长PM"比"帮我分析"的输出质量差异巨大。维度引导确保多角度分析。"避免泛泛而谈"能有效减少套话。',
rel:['format-output','ai-consultant']},

{id:'ai-consultant',m:'角色',lv:'进阶',t:'2m',title:'让 AI 成为你的产品顾问',desc:'模拟资深 PM 角色进行方案评审、决策分析、策略讨论',
prompt:'你是一位资深产品总监，有 15 年互联网产品经验，擅长战略规划和团队管理。\n\n**我的角色**：{{你的角色}}\n**产品**：{{产品名}} - {{一句话描述}}\n**阶段**：{{如"从 0 到 1"或"快速增长期"}}\n\n**当前问题**：\n{{描述你面临的决策或困惑，2-3 句}}\n\n**请**：\n1. 先澄清你认为我可能忽略的关键问题（1-2 个）\n2. 给出你的判断和建议（带理由）\n3. 指出这个决策的风险和应对方案\n4. 如果建议不可行，给出 Plan B',
exIn:'我是 WHEE 的产品经理。正在做 AI 视频生成功能，老板要求2个月上线，技术说至少4个月。',
exOut:'先澄清：老板说的"2个月上线"是指 MVP 还是功能完整版？\n\nMVP 方案（2个月）：1种视频风格+15秒限制+第三方API\n完整版方案（4个月）：多风格+模板库+自研模型\n\n风险：MVP 体验太差可能毁了第一印象\n应对：限量灰度，种子用户先行\nPlan B：做"预约页面"收集需求，给技术争取时间',
why:'"先澄清"机制让 AI 帮你发现忽略的前提假设。要求给 Plan B 避免单点依赖。角色深度定义比笼统的"产品经理"精准得多。',
rel:['role-expert','user-review-sim']},

{id:'user-review-sim',m:'角色',lv:'进阶',t:'2m',title:'让 AI 模拟用户做需求评审',desc:'用用户画像角色检验需求合理性，发现方案盲点',
prompt:'请扮演以下 3 种用户角色，对我的产品方案进行评审：\n\n**产品方案**：\n{{粘贴方案摘要，3-5 句}}\n\n**评审角色**：\n1. **小白用户**：第一次用这类产品，靠直觉操作\n2. **重度用户**：每天使用，对效率极其敏感\n3. **付费决策者**：公司采购负责人，关注 ROI、安全和可靠性\n\n**请对每个角色分别回答**：\n- 核心价值是什么？\n- 最可能的 3 个吐槽点\n- 什么情况下会弃用/拒绝？\n- 给产品团队的建议（1 条）',
exIn:'AI 写作助手：输入一段话，AI 自动优化文笔。定价：免费每天5次，Pro版 $9.9/月无限。',
exOut:'🧑 小白用户：价值=不会写也能写好。吐槽：不像我写的/不知道输入什么/5次太少。\n🔥 重度用户：价值=批量处理。吐槽：没批量导入/没自定义风格/没API。\n💼 付费决策者：吐槽：数据安全？/没团队后台/年费$6000值吗？\n\n建议：加语气选择+批量API+企业版',
why:'多角色模拟 = 多角度盲点检测。吐槽点比优点更有价值——它暴露的是真实使用中的摩擦。',
rel:['ai-consultant','iterate-solution']},

{id:'feed-context',m:'上下文',lv:'入门',t:'1m',title:'给 AI 喂项目背景',desc:'通过结构化背景信息提升 AI 输出的相关性和准确性',
prompt:'我需要你帮我完成一个产品决策。请先阅读以下背景信息：\n\n## 公司与产品\n- 公司：{{公司名}}，{{公司阶段}}\n- 产品：{{产品名}}，{{一句话描述}}\n- 核心指标：{{如"月活 50 万，付费率 6%"}}\n- 竞品：{{主要竞品}}\n\n## 当前阶段\n- {{如"正在做商业化转型"}}\n- {{如"技术团队 20 人，产品团队 5 人"}}\n\n## 我的具体问题\n{{2-3 句描述你要解决的问题}}\n\n请基于以上背景给出分析，不要给出与背景矛盾的通用建议。',
exIn:'公司：美图，上市公司。产品：WHEE，AI 图片编辑，海外为主。月活500万，付费率4%。竞品：Remini、Lensa。问题：做 AI 视频生成还是 AI 图片增强？',
exOut:'判断：先做图片增强\n1. 用户心智匹配：WHEE 用户找"修图"不是"做视频"\n2. 转化路径更短：修图好→立即看到效果→付费\n3. 技术风险低：图片增强有成熟方案\n4. Remini 已做视频增强，需差异化\n\n建议：Q1 图片增强 MVP → Q2 根据数据决定视频方向',
why:'结构化背景让 AI 精准提取信息。"不要与背景矛盾"能有效防止 AI 输出套话。',
rel:['ai-understand-data','ai-consultant']},

{id:'ai-understand-data',m:'上下文',lv:'进阶',t:'2m',title:'让 AI 理解你的产品数据',desc:'用数据上下文让 AI 做精准分析，发现异常和趋势',
prompt:'你是一位数据分析专家。\n\n**数据概况**：\n{{用表格列出数据\n| 指标 | 上周 | 本周 | 变化 |\n|------|------|------|------|\n| DAU | 12 万 | 11.5 万 | -4.2% |\n}}\n\n**背景**：{{如"上周上线了新功能 X"}}\n\n**请**：\n1. 找出数据中最大的异常点\n2. 分析可能的原因（至少 2 个假设）\n3. 给出验证假设的方法\n4. 建议下一步行动（优先级排序）',
exIn:'DAU: 12万→11.5万(-4.2%) | 新用户: 3.2万→2.1万(-34%) | 7日留存: 28%→29%(+1pp) | 付费: 1800→1750(-2.8%)\n背景：上周 onboarding 从5步改成3步',
exOut:'最大异常：新用户暴跌 34%\n\n假设1：新 onboarding 导致困惑（但留存↑说明到达核心功能比例更高）→ 验证：看每一步漏斗\n假设2：外部渠道波动 → 验证：按渠道拆分\n\n🔴 今天：拉漏斗数据\n🟡 本周：按渠道拆分\n🟢 下周：AB测试回滚',
why:'用表格给数据比文字描述精准得多。"至少2个假设"强制多角度思考。优先级排序把"分析"变成"行动"。',
rel:['feed-context','data-monitor']},

{id:'prd-output',m:'输出',lv:'进阶',t:'3m',title:'让 AI 输出标准 PRD 格式',desc:'生成结构化的产品需求文档，节省 60% 的文档时间',
prompt:'你是一位资深产品经理，请帮我写一份 PRD。\n\n## 基本信息\n- **产品**：{{产品名}}\n- **功能名称**：{{功能名}}\n- **目标用户**：{{目标用户}}\n- **背景**：{{为什么做这个功能，2-3 句}}\n\n## 功能描述\n{{描述你要做的功能}}\n\n## 请按以下结构输出：\n\n### 1. 问题定义\n- 用户痛点（3 个）\n- 业务目标（1-2 个可量化的 KPI）\n\n### 2. 解决方案概述\n- 核心交互流程（3-5 步）\n- 关键功能点（5-8 个）\n\n### 3. 功能详细设计\n| 功能点 | 描述 | 优先级 | 验收标准 |\n\n### 4. 非功能需求\n- 性能要求、数据埋点\n\n### 5. 成功指标\n| 指标 | 基线 | 目标 | 衡量周期 |\n\n### 6. 风险与应对\n| 风险 | 可能性 | 影响 | 应对方案 |\n\n### 7. Out of Scope\n- 明确不在范围内的事项（3-5 条）\n\n### 8. 里程碑\n| 阶段 | 时间 | 交付物 |',
exIn:'产品：WHEE。功能：AI 一键换背景。用户：电商卖家、社交媒体用户。背景："换背景"是Top3需求，手动抠图门槛高。',
exOut:'问题定义：痛点：手动抠图耗时/门槛高/手机端无好工具。KPI：功能使用率>15%，付费率+0.5pp\n\n方案：上传→AI识别主体→选背景→生成\n功能：主体识别、背景分割、预设模板、批量处理(付费)\n\n风险：复杂图片不准→手动微调 | 模型成本高→限制免费次数\n\nOut of Scope：视频换背景、实时换背景、开放 API',
why:'结构化模板让 PRD 完整不遗漏。Out of Scope 是 PM 最容易忽略的部分。成功指标前置，写 PRD 时就想好怎么衡量。',
rel:['comp-table','iterate-solution']},

// ========== RENDER ==========
var currentTag='all',searchQ='';

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function findScene(id){for(var i=0;i<S.length;i++)if(S[i].id===id)return S[i];return null}

function renderTags(){
  var html='<button class="tag-btn active" data-tag="all">全部</button>';
  var order=Object.keys(M);
  for(var i=0;i<order.length;i++){
    html+='<button class="tag-btn" data-tag="'+order[i]+'">'+M[order[i]].label+'</button>';
  }
  document.getElementById('tags').innerHTML=html;
  document.querySelectorAll('.tag-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tag-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');
      currentTag=btn.dataset.tag;
      renderCards();
    });
  });
}

function renderCards(){
  var order=Object.keys(M);
  var html='';
  var count=0;
  for(var mi=0;mi<order.length;mi++){
    var mk=order[mi];
    var items=[];
    for(var i=0;i<S.length;i++){
      if(S[i].m!==mk)continue;
      if(currentTag!=='all'&&currentTag!==mk)continue;
      if(searchQ){
        var q=searchQ.toLowerCase();
        var hay=(S[i].title+' '+S[i].desc+' '+S[i].prompt).toLowerCase();
        if(hay.indexOf(q)===-1)continue;
      }
      items.push(S[i]);
    }
    if(!items.length)continue;
    count+=items.length;
    html+='<div class="module-label">'+M[mk].label+'</div>';
    for(var j=0;j<items.length;j++){
      var s=items[j];
      html+='<div class="card" id="'+s.id+'">';
      html+='<div class="card-header">';
      html+='<span class="module-tag">'+M[s.m].label+'</span>';
      html+='<span class="level-tag">'+s.lv+'</span>';
      html+='<span class="time-tag">'+s.t+'</span>';
      html+='</div>';
      html+='<h3>'+esc(s.title)+'</h3>';
      html+='<p class="card-desc">'+esc(s.desc)+'</p>';
      html+='<div class="prompt-box"><pre>'+esc(s.prompt)+'</pre><button class="copy-btn" onclick="copyPrompt(this)">复制</button></div>';
      html+='<details><summary>▶ 示例</summary><div class="example">';
      html+='<div class="example-input"><span class="label">你输入：</span><p>'+esc(s.exIn)+'</p></div>';
      html+='<div class="example-output"><span class="label">AI 输出：</span><pre>'+esc(s.exOut)+'</pre></div>';
      html+='</div></details>';
      html+='<details><summary>▶ 为什么有效？</summary><div class="principle">'+esc(s.why)+'</div></details>';
      if(s.rel&&s.rel.length){
        html+='<div class="related">相关：';
        for(var k=0;k<s.rel.length;k++){
          var rs=findScene(s.rel[k]);
          if(rs)html+='<a onclick="scrollTo_(\''+rs.id+'\')">'+esc(rs.title)+'</a>'+(k<s.rel.length-1?' · ':'');
        }
        html+='</div>';
      }
      html+='</div>';
    }
  }
  document.getElementById('cards').innerHTML=html;
  document.getElementById('no-result').style.display=count?'none':'block';
}

function scrollTo_(id){
  var el=document.getElementById(id);
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}

// ========== COPY ==========
window.copyPrompt=function(btn){
  var box=btn.closest('.prompt-box');
  var pre=box.querySelector('pre');
  var text=pre.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      btn.textContent='已复制 ✓';btn.classList.add('copied');
      setTimeout(function(){btn.textContent='复制';btn.classList.remove('copied')},2000);
    });
  }else{
    var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');btn.textContent='已复制 ✓';btn.classList.add('copied');
    setTimeout(function(){btn.textContent='复制';btn.classList.remove('copied')},2000);
    }catch(e){btn.textContent='失败'}
    document.body.removeChild(ta);
  }
};

// ========== SEARCH ==========
document.getElementById('search').addEventListener('input',function(e){
  searchQ=e.target.value.trim();
  renderCards();
});

// ========== THEME ==========
var themeBtn=document.getElementById('theme-toggle');
var savedTheme=localStorage.getItem('pm-toolbox-theme')||'light';
document.documentElement.dataset.theme=savedTheme;
themeBtn.textContent=savedTheme==='dark'?'☀️':'🌙';
themeBtn.addEventListener('click',function(){
  var c=document.documentElement.dataset.theme,n=c==='dark'?'light':'dark';
  document.documentElement.dataset.theme=n;
  themeBtn.textContent=n==='dark'?'☀️':'🌙';
  localStorage.setItem('pm-toolbox-theme',n);
});

// ========== PROGRESS + BACK-TOP ==========
var progressBar=document.getElementById('progress-bar'),backTop=document.getElementById('back-top');
window.addEventListener('scroll',function(){
  var h=document.documentElement.scrollHeight-window.innerHeight;
  var p=h>0?window.scrollY/h*100:0;
  progressBar.style.width=p+'%';
  backTop.style.display=window.scrollY>window.innerHeight?'flex':'none';
});

// ========== INIT ==========
renderTags();
renderCards();
</script>
