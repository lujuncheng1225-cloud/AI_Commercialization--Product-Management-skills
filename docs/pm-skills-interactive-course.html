<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM AI Skill 工具箱</title>
<style>
:root{--bg:#FAFAFA;--bg2:#F5F5F5;--card:#fff;--text:#1a1a1a;--text2:#666;--text3:#999;--brand:#6C5CE7;--brand-light:#A29BFE;--brand-bg:rgba(108,92,231,.08);--border:#E8E8E8;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-lg:0 4px 12px rgba(0,0,0,.08);--radius:16px;--radius2:12px;--code-bg:#1E1E2E;--code-text:#CDD6F4}
.dark{--bg:#0F0F14;--bg2:#1A1A24;--card:#1E1E2E;--text:#E4E4E7;--text2:#9CA3AF;--text3:#6B7280;--brand:#A29BFE;--brand-light:#C4B5FD;--brand-bg:rgba(162,155,254,.1);--border:#2D2D3D;--shadow:0 1px 3px rgba(0,0,0,.2);--shadow-lg:0 4px 12px rgba(0,0,0,.3);--code-bg:#16161E}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:24px 20px 60px}
.header{text-align:center;padding:40px 0 32px}
.header h1{font-size:28px;font-weight:700;margin-bottom:6px}
.header p{color:var(--text2);font-size:15px}
.hero-links{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:0 auto 20px;max-width:860px}
.quick-link{display:block;padding:16px 18px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--text);text-decoration:none;transition:all .2s}
.quick-link:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--brand-light)}
.quick-link strong{display:block;font-size:15px;margin-bottom:4px}
.quick-link span{display:block;font-size:13px;color:var(--text2);line-height:1.5}
.home-panels{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin:0 auto 24px;max-width:860px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.panel h3{font-size:16px;font-weight:700;margin-bottom:12px}
.panel-list{list-style:none;display:grid;gap:10px}
.panel-list li{color:var(--text2);font-size:14px;padding-left:14px;position:relative}
.panel-list li::before{content:'';position:absolute;left:0;top:10px;width:6px;height:6px;border-radius:50%;background:var(--brand)}
.positioning-note{max-width:860px;margin:0 auto 20px;padding:16px 18px;border:1px solid var(--border);border-radius:var(--radius);background:linear-gradient(135deg,var(--brand-bg),transparent 70%),var(--card);box-shadow:var(--shadow)}
.positioning-note strong{display:block;font-size:15px;margin-bottom:6px}
.positioning-note p{font-size:14px;color:var(--text2);line-height:1.7}
.home-section{max-width:860px;margin:0 auto 24px}
.section-header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:12px}
.section-header h3{font-size:17px}
.section-header p{font-size:13px;color:var(--text2);max-width:540px}
.guided-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.guided-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.guided-card strong{display:block;font-size:16px;margin-bottom:8px}
.guided-card p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.guided-actions{display:flex;flex-wrap:wrap;gap:8px}
.guided-btn{padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;transition:all .2s}
.guided-btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.guided-btn:hover{transform:translateY(-1px);border-color:var(--brand-light)}
.flagship-meta{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 14px}
.flagship-pill{display:inline-flex;align-items:center;padding:4px 9px;border-radius:999px;background:var(--brand-bg);color:var(--brand);font-size:12px;font-weight:700}
.usage-list{display:grid;gap:10px}
.usage-item{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:var(--bg2);text-align:left;cursor:pointer;transition:all .2s}
.usage-item:hover{border-color:var(--brand-light);transform:translateY(-1px)}
.usage-item strong{display:block;font-size:14px;color:var(--text);margin-bottom:4px}
.usage-item span{display:block;font-size:12px;color:var(--text3)}
.usage-empty{font-size:14px;color:var(--text3)}
.search-box{max-width:480px;margin:0 auto 24px;position:relative}
.search-box input{width:100%;padding:12px 16px 12px 44px;border:1px solid var(--border);border-radius:var(--radius2);background:var(--card);color:var(--text);font-size:15px;outline:none;transition:all .2s}
.search-box input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-bg)}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3)}
.categories{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:32px}
.cat-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
.cat-btn:hover{border-color:var(--brand);color:var(--brand)}
.cat-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.dark .cat-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;cursor:pointer;transition:all .2s}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--brand-light)}
.card .cat-tag{font-size:11px;color:var(--brand);font-weight:600;letter-spacing:.5px;margin-bottom:10px}
.card h3{font-size:17px;font-weight:600;margin-bottom:6px}
.card .desc{color:var(--text2);font-size:13px;margin-bottom:16px;line-height:1.5}
.card .meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.card .meta .level{padding:2px 8px;border-radius:6px;background:var(--brand-bg);color:var(--brand);font-weight:500}
.theme-toggle{position:fixed;top:16px;right:16px;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:100}
.lang-toggle{position:fixed;top:16px;right:62px;padding:4px;border-radius:20px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;font-size:12px;font-weight:600;z-index:100;color:var(--text2);gap:0;overflow:hidden}
.lang-toggle button{border:none;background:none;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text3);transition:all .2s;border-radius:16px}
.lang-toggle button.active{background:var(--brand);color:#fff}
.detail{max-width:600px;margin:0 auto}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:14px;cursor:pointer;margin-bottom:24px;background:none;border:none}
.back-btn:hover{color:var(--brand)}
.detail h2{font-size:24px;font-weight:700;margin-bottom:8px}
.detail .detail-desc{color:var(--text2);font-size:15px;margin-bottom:12px}
.system-ref{display:inline-flex;align-items:center;gap:6px;max-width:100%;margin-bottom:28px;padding:6px 10px;border-radius:8px;background:var(--brand-bg);color:var(--text2);font-size:12px}
.system-ref code{color:var(--brand);font-size:12px;word-break:break-all}
.system-ref a{color:var(--brand);text-decoration:none;font-weight:600}
.system-ref a:hover{text-decoration:underline}
.step-indicator{display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:14px;color:var(--text3)}
.step-indicator .current{color:var(--brand);font-weight:600}
.step-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.step-bar .fill{height:100%;background:var(--brand);border-radius:2px;transition:width .3s}
.step-title{font-size:18px;font-weight:600;margin-bottom:20px}
.field{margin-bottom:20px}
.field label{display:block;font-size:14px;font-weight:500;margin-bottom:8px}
.field input[type="text"],.field textarea{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius2);background:var(--card);color:var(--text);font-size:15px;outline:none;transition:all .2s;font-family:inherit}
.field input:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-bg)}
.field textarea{min-height:100px;resize:vertical}
.tag-group{display:flex;flex-wrap:wrap;gap:8px}
.tag-option{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:14px;cursor:pointer;transition:all .2s;user-select:none}
.tag-option:hover{border-color:var(--brand-light);color:var(--brand)}
.tag-option.selected{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-row{display:flex;justify-content:space-between;margin-top:32px}
.btn{padding:12px 24px;border-radius:var(--radius2);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--text3)}
.btn-link{display:inline-flex;align-items:center;justify-content:center;text-decoration:none}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.result{max-width:640px;margin:0 auto}
.result .check{font-size:28px;margin-bottom:12px}
.result h2{font-size:22px;font-weight:700;margin-bottom:20px}
.result-subtitle{color:var(--text2);font-size:14px;margin:-8px 0 16px}
.result-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.metric-card{border:1px solid var(--border);border-radius:var(--radius2);background:var(--card);padding:16px}
.metric-card strong{display:block;font-size:13px;color:var(--text2);margin-bottom:8px}
.metric-card span{display:block;font-size:18px;font-weight:700;line-height:1.4}
.brief-panel{border:1px solid var(--border);border-radius:var(--radius);background:var(--card);padding:20px;margin-bottom:16px}
.brief-panel h3{font-size:16px;font-weight:700;margin-bottom:14px}
.brief-list,.section-grid{display:grid;gap:12px}
.brief-item,.section-card{border:1px solid var(--border);border-radius:12px;padding:14px}
.brief-item{background:var(--bg2)}
.brief-item strong,.section-card strong{display:block;font-size:13px;margin-bottom:6px}
.brief-item div,.section-card p{font-size:14px;color:var(--text2);line-height:1.7;white-space:pre-wrap;margin:0}
.section-card{background:var(--card);position:relative;padding-top:16px}
.section-card::before{content:'';position:absolute;left:0;top:0;right:0;height:3px;border-radius:12px 12px 0 0;background:var(--brand)}
.section-card[data-tone="risk"]::before{background:#EF4444}
.section-card[data-tone="assumption"]::before{background:#F59E0B}
.section-card[data-tone="next"]::before{background:#10B981}
.section-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.section-index{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;border-radius:999px;background:var(--brand-bg);color:var(--brand);font-size:13px;font-weight:700}
.section-card[data-tone="risk"] .section-index{background:rgba(239,68,68,.12);color:#EF4444}
.section-card[data-tone="assumption"] .section-index{background:rgba(245,158,11,.14);color:#D97706}
.section-card[data-tone="next"] .section-index{background:rgba(16,185,129,.14);color:#059669}
.raw-brief details{border:1px dashed var(--border);border-radius:12px;padding:14px;background:var(--bg2)}
.raw-brief summary{cursor:pointer;font-size:14px;font-weight:600;color:var(--text)}
.raw-brief .prompt-block{margin:14px 0 0}
.prompt-block{background:var(--code-bg);border-radius:var(--radius2);padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.prompt-block::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--brand);border-radius:4px 0 0 4px}
.prompt-block pre{color:var(--code-text);font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-word;font-family:'SF Mono','Fira Code',monospace;margin:0}
.result-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.tips{background:var(--brand-bg);border-radius:var(--radius2);padding:20px}
.tips h4{font-size:14px;margin-bottom:10px;color:var(--brand)}
.tips li{font-size:13px;color:var(--text2);margin-bottom:4px;padding-left:4px}
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:15px}
@media(max-width:760px){.home-panels{grid-template-columns:1fr}}
@media(max-width:640px){.header h1{font-size:22px}.grid{grid-template-columns:1fr}.container{padding:16px 16px 40px}.header{padding:24px 0 20px}.btn-row{flex-direction:column;gap:10px}.btn{width:100%;text-align:center}.result-actions{flex-direction:column}.hero-links{grid-template-columns:1fr}}
.hidden{display:none!important}
</style>
</head>

function catLabel(c){return i18n[currentLang].categories[c]||c;}
function levelLabel(l){return i18n[currentLang].levels[l]||l;}
function getSkill(id){return skills.find(skill=>skill.id===id);}
function sourceUrl(s){return`${REPO_BLOB_BASE}${s.sourceRef}`;}
function scenarioUrl(id){
  if(typeof window==='undefined'||!window.location?.href)return`${SITE_BASE}pm-skills-interactive-course.html?scenario=${encodeURIComponent(id)}`;
  const url=new URL(window.location.href);
  url.searchParams.set('scenario',id);
  url.searchParams.set('lang',currentLang);
  return url.toString();
}
function previewLabel(s){return s.sourceRef.startsWith('commands/')?t('previewCommand'):t('previewSkill');}
function sourceMeta(s){
  if(!s.sourceRef)return'';
  const fit=s.sourceFit==='direct'?t('fitDirect'):t('fitAdjacent');
  return`<div class="system-ref">${t('systemPath')}: <code>${s.sourceRef}</code> · ${fit} · <a href="${sourceUrl(s)}" target="_blank" rel="noopener" onclick="trackSourcePreview('${s.id}','detail')">${previewLabel(s)}</a></div>`;
}
function homeLinks(){
  return currentLang==='zh'?[
    {id:'product-surface',href:`${SITE_BASE}product/`,title:'产品入口',desc:'零门槛上手、在线使用、团队接入'},
    {id:'benchmark-center',href:`${SITE_BASE}benchmarks/`,title:'Benchmark Center',desc:'公开 benchmark、路由和输出标准'},
    {id:'category-language',href:`${SITE_BASE}core/category-language/`,title:'Category Language',desc:'把项目定位词变成固定说法'},
    {id:'distribution-engine',href:`${SITE_BASE}brand/distribution-engine/`,title:'分发飞轮',desc:'每周案例、benchmark、demo、月度更新'}
  ]:[
    {id:'product-surface',href:`${SITE_BASE}product/`,title:'Product Surface',desc:'Zero-friction onboarding, online use, team setup'},
    {id:'benchmark-center',href:`${SITE_BASE}benchmarks/`,title:'Benchmark Center',desc:'Public benchmark, routing, and output standards'},
    {id:'category-language',href:`${SITE_BASE}core/category-language/`,title:'Category Language',desc:'Own the terms that define the category'},
    {id:'distribution-engine',href:`${SITE_BASE}brand/distribution-engine/`,title:'Distribution Engine',desc:'Weekly case, benchmark, demo, and monthly release rhythm'}
  ];
}
function entryBullets(){
  return currentLang==='zh'?[
    'Decision：先给出主判断，不先堆长文。',
    'Evidence：把已知信息和信息缺口分开。',
    'Assumptions：明确哪些地方是推断，不假装确定。',
    'Risks / Next Steps：把风险和下一步动作写出来。'
  ]:[
    'Decision: lead with a clear judgment instead of a longer answer.',
    'Evidence: separate known facts from information gaps.',
    'Assumptions: name inference explicitly instead of pretending certainty.',
    'Risks / Next Steps: make the tradeoffs and follow-up work visible.'
  ];
}
function setLang(lang){
  currentLang=lang;localStorage.setItem('lang',lang);
  document.getElementById('langZh').classList.toggle('active',lang==='zh');
  document.getElementById('langEn').classList.toggle('active',lang==='en');
  document.documentElement.lang=lang==='zh'?'zh-CN':'en';
  syncUrlState(currentSkill?.id||null);
  if(currentSkill){
    if(document.getElementById('result').classList.contains('hidden'))renderStep(); else renderResult();
  }else{
    init();
  }
}
document.getElementById('langZh').classList.toggle('active',currentLang==='zh');
document.getElementById('langEn').classList.toggle('active',currentLang==='en');
document.documentElement.lang=currentLang==='zh'?'zh-CN':'en';

// ── APP ──────────────────────────────────────────────
let currentSkill=null, currentStep=0, formData={}, activeCategory='all', lastGeneratedPrompt='';

function getEventLog(){
  try{return JSON.parse(localStorage.getItem(EVENT_LOG_KEY)||'[]');}
  catch(_){return [];}
}
function trackEvent(name,props={}){
  try{
    const next=[...getEventLog(),{name,props,lang:currentLang,time:new Date().toISOString()}].slice(-MAX_EVENT_LOG);
    localStorage.setItem(EVENT_LOG_KEY,JSON.stringify(next));
  }catch(_){}
  if(typeof window.plausible==='function'){
    window.plausible(name,{props});
  }
}
function trackQuickLink(id){trackEvent('quick_link_click',{id});}
function trackSourcePreview(skillId,placement){trackEvent('source_preview',{skillId,placement});}
function trackRecentOpen(skillId){trackEvent('recent_usage_open',{skillId});}
function trackRawBrief(open){trackEvent('raw_brief_toggle',{skillId:currentSkill?.id,open});}
function trackScenarioLaunch(skillId,source){trackEvent('scenario_launch',{skillId,source});}
function trackScenarioShare(skillId,source){trackEvent('scenario_share',{skillId,source});}

function toggleTheme(){
  document.body.classList.toggle('dark');
  document.querySelector('.theme-toggle').textContent=document.body.classList.contains('dark')?'☀️':'🌙';
  localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');
}
if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');document.querySelector('.theme-toggle').textContent='☀️';}

function init(){
  const allLabel=t('all');
  const catKeys=[...new Set(skills.map(s=>s.category))];
  document.getElementById('cats').innerHTML=[allLabel,...catKeys.map(c=>catLabel(c))].map((label,i)=>`<button class="cat-btn${i===0?' active':''}" data-cat="${i===0?'all':catKeys[i-1]}" onclick="setCat('${i===0?'all':catKeys[i-1]}')">${label}</button>`).join('');
  document.querySelector('.header h1').textContent=t('pageTitle');
  document.querySelector('.header p').textContent=t('pageSubtitle');
  document.getElementById('entryTitle').textContent=t('entryTitle');
  document.getElementById('usageTitle').textContent=t('usageTitle');
  document.getElementById('guidedTitle').textContent=t('guidedTitle');
  document.getElementById('guidedSubtitle').textContent=t('guidedSubtitle');
  document.getElementById('flagshipTitle').textContent=t('flagshipTitle');
  document.getElementById('flagshipSubtitle').textContent=t('flagshipSubtitle');
  document.getElementById('positioningNote').innerHTML=`<strong>${t('positioningTitle')}</strong><p>${t('positioningBody')}</p>`;
  document.getElementById('heroLinks').innerHTML=homeLinks().map(link=>`<a class="quick-link" href="${link.href}" onclick="trackQuickLink('${link.id}')"><strong>${link.title}</strong><span>${link.desc}</span></a>`).join('');
  document.getElementById('entryList').innerHTML=entryBullets().map(item=>`<li>${item}</li>`).join('');
  renderGuidedGrid();
  renderFlagshipGrid();
  document.getElementById('search').placeholder=t('searchPlaceholder');
  document.title=t('pageTitle');
  trackEvent('toolkit_page_view',{surface:'home'});
  renderRecentUsage();
  filterCards();
  applyScenarioFromUrl();
}

function renderGuidedGrid(){
  document.getElementById('guidedGrid').innerHTML=GUIDED_PATHS.map(path=>{
    const primary=getSkill(path.primary);
    const alternates=path.alternates.map(getSkill).filter(Boolean);
    if(!primary)return'';
    const title=currentLang==='zh'?path.titleZh:path.titleEn;
    const desc=currentLang==='zh'?path.descZh:path.descEn;
    return`<div class="guided-card">
      <strong>${title}</strong>
      <p>${desc}</p>
      <div class="flagship-meta"><span class="flagship-pill">${catLabel(primary.category)}</span><span class="flagship-pill">${levelLabel(primary.level)}</span></div>
      <p><strong>${t('whyThisPath')}</strong><br>${currentLang==='zh'?primary.desc:primary.descEn}</p>
      <div class="guided-actions">
        <button class="guided-btn primary" onclick="launchScenario('${primary.id}','guided:${path.key}')">${t('startNow')}</button>
        <button class="guided-btn" onclick="copyScenarioLink('${primary.id}',this,'guided:${path.key}')">${t('sharePath')}</button>
      </div>
      <div class="guided-actions">
        ${alternates.map(skill=>`<button class="guided-btn" onclick="launchScenario('${skill.id}','guided-alt:${path.key}')">${currentLang==='zh'?skill.title:skill.titleEn}</button>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderFlagshipGrid(){
  document.getElementById('flagshipGrid').innerHTML=FLAGSHIP_SCENARIOS.map(item=>{
    const skill=getSkill(item.id);
    if(!skill)return'';
    const reason=currentLang==='zh'?item.reasonZh:item.reasonEn;
    return`<div class="guided-card">
      <strong>${currentLang==='zh'?skill.title:skill.titleEn}</strong>
      <p>${currentLang==='zh'?skill.desc:skill.descEn}</p>
      <div class="flagship-meta"><span class="flagship-pill">${catLabel(skill.category)}</span><span class="flagship-pill">${levelLabel(skill.level)}</span><span class="flagship-pill">${t('featuredReason')}</span></div>
      <p>${reason}</p>
      <div class="guided-actions">
        <button class="guided-btn primary" onclick="launchScenario('${skill.id}','flagship')">${t('startNow')}</button>
        <button class="guided-btn" onclick="copyScenarioLink('${skill.id}',this,'flagship')">${t('sharePath')}</button>
      </div>
    </div>`;
  }).join('');
}

function setCat(c){activeCategory=c;trackEvent('category_filter',{category:c});document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===c));filterCards();}
function filterCards(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=skills.filter(s=>(activeCategory==='all'||s.category===activeCategory)&&(s.title.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q)||(s.titleEn||'').toLowerCase().includes(q)||(s.descEn||'').toLowerCase().includes(q)||s.category.toLowerCase().includes(q)||catLabel(s.category).toLowerCase().includes(q)));
  const grid=document.getElementById('grid');
  grid.innerHTML=filtered.length?filtered.map(s=>`<div class="card" onclick="openSkill('${s.id}')"><div class="cat-tag">${catLabel(s.category)}</div><h3>${currentLang==='zh'?s.title:s.titleEn}</h3><div class="desc">${currentLang==='zh'?s.desc:s.descEn}</div><div class="meta"><span class="level">${levelLabel(s.level)}</span><span>${t('cardMeta')(s.steps.length)}</span></div></div>`).join(''):`<div class="empty">${t('empty')}</div>`;
}

function openSkill(id){
  currentSkill=skills.find(s=>s.id===id);currentStep=0;formData={};
  syncUrlState(id);
  trackEvent('skill_open',{skillId:id,sourceRef:currentSkill.sourceRef});
  currentSkill.steps.forEach(step=>step.fields.forEach(f=>{
    if(f.type==='checkbox')formData[f.key]=[...(f.defaults||[])];
    else if(f.type==='radio')formData[f.key]=f.defaults||'';
    else formData[f.key]='';
  }));
  show('detail');hide('home');hide('result');renderStep();
}

function launchScenario(id,source){
  trackScenarioLaunch(id,source);
  openSkill(id);
}

function copyScenarioLink(id,btn,source='share'){
  trackScenarioShare(id,source);
  copyText(scenarioUrl(id),btn);
}

function syncUrlState(id){
  if(typeof window==='undefined'||!window.location?.href||!window.history?.replaceState)return;
  const url=new URL(window.location.href);
  if(id)url.searchParams.set('scenario',id);
  else url.searchParams.delete('scenario');
  url.searchParams.set('lang',currentLang);
  window.history.replaceState({},'',url.toString());
}

function applyScenarioFromUrl(){
  if(typeof window==='undefined'||!window.location?.search)return;
  const id=new URLSearchParams(window.location.search).get('scenario');
  if(id&&getSkill(id))openSkill(id);
}

function renderStep(){
  const s=currentSkill,step=s.steps[currentStep];
  const pct=((currentStep+1)/s.steps.length*100);
  const isLast=currentStep===s.steps.length-1;
  document.getElementById('detail').innerHTML=`
    <button class="back-btn" onclick="goHome()">${t('back')}</button>
    <h2>${currentLang==='zh'?s.title:s.titleEn}</h2>
    <div class="detail-desc">${currentLang==='zh'?s.desc:s.descEn}</div>
    ${sourceMeta(s)}
    <div class="step-indicator"><span class="current">${t('stepOf')(currentStep+1,s.steps.length)}</span><div class="step-bar"><div class="fill" style="width:${pct}%"></div></div></div>
    <div class="step-title">${step.title}</div>
    ${step.fields.map(f=>renderField(f)).join('')}
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="prevStep()" ${currentStep===0?'disabled':''}>${t('prev')}</button>
      <button class="btn btn-primary" onclick="${isLast?'generate()':'nextStep()'}">${isLast?t('generate'):t('next')}</button>
    </div>`;
}

function renderField(f){
  if(f.type==='text')return`<div class="field"><label>${f.label}</label><input type="text" value="${esc(formData[f.key])}" placeholder="${f.placeholder||''}" onchange="formData['${f.key}']=this.value"></div>`;
  if(f.type==='textarea')return`<div class="field"><label>${f.label}</label><textarea placeholder="${f.placeholder||''}" onchange="formData['${f.key}']=this.value">${esc(formData[f.key])}</textarea></div>`;
  if(f.type==='checkbox')return`<div class="field"><label>${f.label||''}</label><div class="tag-group">${f.options.map(o=>`<div class="tag-option${(formData[f.key]||[]).includes(o)?' selected':''}" onclick="toggleTag('${f.key}','${o}',this)">${o}</div>`).join('')}</div></div>`;
  if(f.type==='radio')return`<div class="field"><label>${f.label||''}</label><div class="tag-group">${f.options.map(o=>`<div class="tag-option${formData[f.key]===o?' selected':''}" onclick="setRadio('${f.key}','${o}',this)">${o}</div>`).join('')}</div></div>`;
  return'';
}

function toggleTag(key,val,el){if(!formData[key])formData[key]=[];const i=formData[key].indexOf(val);if(i>=0)formData[key].splice(i,1);else formData[key].push(val);el.classList.toggle('selected');}
function setRadio(key,val,el){formData[key]=val;el.parentElement.querySelectorAll('.tag-option').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');}
function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function nextStep(){currentStep++;renderStep();}
function prevStep(){currentStep--;renderStep();}

function generate(){
  lastGeneratedPrompt=currentSkill.prompt(formData);
  trackEvent('brief_generate',{skillId:currentSkill.id,sourceRef:currentSkill.sourceRef,stepCount:currentSkill.steps.length});
  saveUsage(currentSkill);
  show('result');hide('detail');hide('home');
  renderResult();
}

function renderResult(){
  const filledInputs=getFilledInputs();
  const briefModel=parseDecisionBrief(lastGeneratedPrompt);
  document.getElementById('result').innerHTML=`
    <div class="check">✅</div>
    <h2>${t('promptGenerated')}</h2>
    <div class="result-subtitle">${t('resultSubtitle')}</div>
    ${sourceMeta(currentSkill)}
    <div class="result-metrics">
      <div class="metric-card"><strong>${t('scenarioMetric')}</strong><span>${currentLang==='zh'?currentSkill.title:currentSkill.titleEn}</span></div>
      <div class="metric-card"><strong>${t('inputsMetric')}</strong><span>${filledInputs.length}</span></div>
      <div class="metric-card"><strong>${t('sectionsMetric')}</strong><span>${briefModel.sections.length||'-'}</span></div>
    </div>
    <div class="brief-panel"><h3>${t('briefIntent')}</h3>${renderContextBlocks(briefModel.contextBlocks)}</div>
    <div class="brief-panel"><h3>${t('inputSnapshot')}</h3>${renderInputSnapshot(filledInputs)}</div>
    <div class="brief-panel"><h3>${t('outputContract')}</h3>${renderSectionCards(briefModel.sections)}</div>
    <div class="result-actions">
      <button class="btn btn-primary" onclick="copyAgent('codex',this)">${t('copyCodex')}</button>
      <button class="btn btn-secondary" onclick="copyAgent('claude',this)">${t('copyClaude')}</button>
      <button class="btn btn-secondary" onclick="copyAgent('cursor',this)">${t('copyCursor')}</button>
      <button class="btn btn-secondary" onclick="copyScenarioLink('${currentSkill.id}',this,'result')">${t('shareScenario')}</button>
      <button class="btn btn-secondary" onclick="copyPrompt(this)">${t('copy')}</button>
      <a class="btn btn-secondary btn-link" href="${sourceUrl(currentSkill)}" target="_blank" rel="noopener" onclick="trackSourcePreview('${currentSkill.id}','result')">${previewLabel(currentSkill)}</a>
      <button class="btn btn-secondary" onclick="backToForm()">${t('modify')}</button>
      <button class="btn btn-secondary" onclick="generate()">${t('regenerate')}</button>
    </div>
    <div class="brief-panel raw-brief">
      <details ontoggle="trackRawBrief(this.open)">
        <summary>${t('rawBrief')}</summary>
        <div class="prompt-block"><pre>${esc(lastGeneratedPrompt)}</pre></div>
      </details>
    </div>
    <div class="tips"><h4>${t('tipsTitle')}</h4><ul>${currentSkill.tips.map(tip=>`<li>${tip}</li>`).join('')}</ul></div>`;
}

function getFilledInputs(){
  return currentSkill.steps.flatMap(step=>step.fields.map(field=>{
    const raw=formData[field.key];
    const value=Array.isArray(raw)?raw.filter(Boolean).join(' / '):String(raw||'').trim();
    if(!value)return null;
    return{label:field.label||step.title,value};
  })).filter(Boolean);
}

function parseDecisionBrief(prompt){
  const blocks=prompt.split(/\n\s*\n/).map(block=>block.trim()).filter(Boolean);
  const outputIndex=blocks.findIndex(block=>/(请按以下结构输出|请输出|Please output|Respond with)/i.test(block));
  const contextBlocks=(outputIndex===-1?blocks:blocks.slice(0,outputIndex)).map((block,index)=>formatContextBlock(block,index));
  const sectionSource=outputIndex===-1?prompt:blocks.slice(outputIndex).join('\n\n');
  return{contextBlocks,sections:extractSections(sectionSource)};
}

function formatContextBlock(block,index){
  const lines=block.split('\n').map(line=>line.trim()).filter(Boolean);
  const first=lines[0]||'';
  const labelMatch=first.match(/^([^:：]{1,32})[:：]\s*(.*)$/);
  if(labelMatch){
    const valueLines=[labelMatch[2],...lines.slice(1)].filter(Boolean);
    return{label:labelMatch[1],value:valueLines.join('\n')};
  }
  return{label:index===0?t('briefIntent'):`${t('contextLabel')} ${index}`,value:lines.join('\n')};
}

function extractSections(text){
  const sections=[];
  let current=null;
  text.split('\n').forEach(line=>{
    const trimmed=line.trim();
    if(!trimmed)return;
    const match=trimmed.match(/^(\d+)\.\s*(.+)$/);
    if(match){
      current={index:match[1],title:match[2],details:[]};
      sections.push(current);
      return;
    }
    if(/^(请按以下结构输出|请输出|Please output|Respond with)/i.test(trimmed))return;
    if(current)current.details.push(trimmed);
  });
  return sections.map(section=>({...section,body:section.details.join('\n')}));
}

function renderContextBlocks(blocks){
  if(!blocks.length)return`<div class="brief-list"><div class="brief-item"><strong>${t('briefIntent')}</strong><div>${escapeMultiline(lastGeneratedPrompt)}</div></div></div>`;
  return`<div class="brief-list">${blocks.map(block=>`<div class="brief-item"><strong>${esc(block.label)}</strong><div>${escapeMultiline(block.value)}</div></div>`).join('')}</div>`;
}

function renderInputSnapshot(items){
  if(!items.length)return`<div class="brief-list"><div class="brief-item"><strong>${t('inputSnapshot')}</strong><div>${t('emptyInputs')}</div></div></div>`;
  return`<div class="brief-list">${items.map(item=>`<div class="brief-item"><strong>${esc(item.label)}</strong><div>${escapeMultiline(item.value)}</div></div>`).join('')}</div>`;
}

function renderSectionCards(sections){
  if(!sections.length)return`<div class="section-grid"><div class="section-card"><strong>${t('outputContract')}</strong><p>${t('emptySections')}</p></div></div>`;
  return`<div class="section-grid">${sections.map(section=>`<div class="section-card" data-tone="${sectionTone(section.title)}"><div class="section-head"><span class="section-index">${section.index}</span><div><strong>${esc(section.title)}</strong></div></div><p>${escapeMultiline(section.body||section.title)}</p></div>`).join('')}</div>`;
}

function sectionTone(title){
  const normalized=String(title||'').toLowerCase();
  if(/风险|risk|guardrail/.test(normalized))return'risk';
  if(/假设|信息缺口|gap|assumption|uncertainty/.test(normalized))return'assumption';
  if(/下一步|行动|next step|next steps|execution|上线策略/.test(normalized))return'next';
  return'default';
}

function escapeMultiline(text){
  return esc(String(text||'')).replace(/\n/g,'<br>');
}

function copyPrompt(btn){
  trackEvent('brief_copy',{skillId:currentSkill.id});
  copyText(lastGeneratedPrompt,btn);
}

function copyAgent(platform,btn){trackEvent('agent_copy',{skillId:currentSkill.id,platform});copyText(buildAgentPrompt(platform),btn);}
function copyText(text,btn){
  const original=btn.textContent;
  navigator.clipboard.writeText(text).then(()=>{btn.textContent=t('copied');setTimeout(()=>btn.textContent=original,2000);});
}
function buildAgentPrompt(platform){
  const platformLine={
    codex:currentLang==='zh'?'目标平台：Codex':'Target platform: Codex',
    claude:currentLang==='zh'?'目标平台：Claude Code':'Target platform: Claude Code',
    cursor:currentLang==='zh'?'目标平台：Cursor':'Target platform: Cursor'
  }[platform];
  const mapping=currentSkill.sourceFit==='direct'
    ?(currentLang==='zh'?'这个场景与底层系统文件一一对应。':'This scenario maps directly to the underlying system file.')
    :(currentLang==='zh'?'这个场景是公开入口，使用最接近的底层系统文件。':'This scenario is a public entry point that maps to the closest system file.');
  const taskLabel=currentLang==='zh'?'判断简报：':'Decision brief:';
  const openLabel=currentLang==='zh'?'优先使用这个系统文件：':'Use this system file as the primary instruction:';
  const guardLabel=currentLang==='zh'
    ?'请保留结构化判断、假设、风险和下一步，不要退化成泛泛 prompt 回答。'
    :'Preserve structured judgment, assumptions, risks, and next steps instead of falling back to a generic prompt answer.';
  return`${platformLine}\n${openLabel} ${currentSkill.sourceRef}\n${mapping}\n${guardLabel}\n\n${taskLabel}\n${lastGeneratedPrompt}`;
}
function saveUsage(skill){
  const existing=JSON.parse(localStorage.getItem(RECENT_USAGE_KEY)||'[]').filter(item=>item.id!==skill.id);
  existing.unshift({id:skill.id,time:new Date().toISOString()});
  localStorage.setItem(RECENT_USAGE_KEY,JSON.stringify(existing.slice(0,6)));
  renderRecentUsage();
}
function renderRecentUsage(){
  const items=JSON.parse(localStorage.getItem(RECENT_USAGE_KEY)||'[]');
  const container=document.getElementById('recentUsage');
  if(!items.length){
    container.innerHTML=`<div class="usage-empty">${t('usageEmpty')}</div>`;
    return;
  }
  container.innerHTML=`<div class="usage-list">${items.map(item=>{
    const skill=skills.find(s=>s.id===item.id);
    if(!skill)return'';
    const title=currentLang==='zh'?skill.title:skill.titleEn;
    return`<button class="usage-item" onclick="trackRecentOpen('${skill.id}');openSkill('${skill.id}')"><strong>${title}</strong><span>${formatTime(item.time)}</span></button>`;
  }).join('')}</div>`;
}
function formatTime(iso){
  const date=new Date(iso);
  if(Number.isNaN(date.getTime()))return'';
  return new Intl.DateTimeFormat(currentLang==='zh'?'zh-CN':'en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}).format(date);
}

function backToForm(){show('detail');hide('result');renderStep();}
