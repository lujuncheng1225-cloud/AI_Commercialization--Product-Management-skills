<style>
:root,[data-theme="light"]{--bg:#FAF7F2;--bg-warm:#F5F0E8;--bg-code:#1E1E2E;--nav-bg:rgba(250,247,242,.92);--nav-shadow:rgba(44,42,40,.05);--text:#2C2A28;--text-2:#6B6560;--text-3:#9E9790;--border:#E5DFD6;--border-l:#EEEBE5;--surface:#FFF;--surface-warm:#FDF9F3;--accent:#D94F30;--accent-h:#C4432A;--accent-l:#FDEEE9;--accent-m:#E8836C;--success:#2D8B55;--error:#C93B3B;--info:#2A7B9B;--c1:#D94F30;--c2:#2A7B9B;--c3:#7B6DAA;--c4:#D4A843;--c5:#2D8B55;--c6:#E07B39;--c7:#5B8C5A;--c8:#9B6B9E;--font-d:'Bricolage Grotesque',Georgia,serif;--font-b:'DM Sans',-apple-system,sans-serif;--font-m:'JetBrains Mono','Fira Code',Consolas,monospace;--xs:.75rem;--sm:.875rem;--base:1rem;--lg:1.125rem;--xl:1.25rem;--2xl:1.5rem;--3xl:1.875rem;--4xl:2.25rem;--5xl:3rem;--6xl:3.75rem;--lh-t:1.15;--lh-n:1.6;--s1:.25rem;--s2:.5rem;--s3:.75rem;--s4:1rem;--s5:1.25rem;--s6:1.5rem;--s8:2rem;--s10:2.5rem;--s12:3rem;--s16:4rem;--cw:800px;--cw-w:1000px;--r-sm:8px;--r-md:12px;--r-lg:16px;--r-full:9999px;--shadow-sm:0 1px 2px rgba(44,42,40,.05);--shadow-md:0 4px 12px rgba(44,42,40,.08);--shadow-lg:0 8px 24px rgba(44,42,40,.1);--ease:cubic-bezier(.16,1,.3,1);--dur:300ms}
[data-theme="dark"]{--bg:#1A1A1E;--bg-warm:#222226;--bg-code:#11111B;--nav-bg:rgba(26,26,30,.92);--nav-shadow:rgba(0,0,0,.2);--text:#E0DDD8;--text-2:#A09A93;--text-3:#706B65;--border:#333;--border-l:#2A2A2E;--surface:#242428;--surface-warm:#1E1E22;--accent-l:#3D1A12}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:auto}body{background:var(--bg);color:var(--text);transition:background .3s,color .3s;font-family:var(--font-b);line-height:var(--lh-n);overflow-x:hidden}

.sr-header{padding:var(--s3) var(--s4);font-size:var(--xs);color:var(--text-3);border-bottom:1px solid var(--border-l)}
.sr-item{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) var(--s4);cursor:pointer;transition:background .15s}.sr-item:hover{background:var(--accent-l)}

.scenes-section{max-width:var(--cw-w);margin:0 auto;padding:0 var(--s6) var(--s16);position:relative;z-index:1}
.scene-group-label{display:flex;align-items:center;gap:var(--s4);margin:var(--s10) 0 var(--s6);font-family:var(--font-d);font-size:var(--lg);font-weight:700;color:var(--text-2)}.scene-group-label:first-child{margin-top:0}.scene-group-label::after{content:'';flex:1;height:1px;background:var(--border-l)}

.scene-card{background:var(--surface);border:1px solid var(--border-l);border-radius:var(--r-lg);padding:var(--s6);cursor:pointer;transition:all var(--dur) var(--ease);overflow:hidden}.scene-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--accent)}
.scene-card-tag{display:inline-block;padding:3px 10px;border-radius:var(--r-full);font-size:var(--xs);font-weight:600;color:white;margin-bottom:var(--s3)}
.scene-card h3{font-family:var(--font-d);font-size:var(--xl);font-weight:700;margin-bottom:var(--s2);line-height:var(--lh-t)}.scene-card p{font-size:var(--sm);color:var(--text-2);line-height:var(--lh-n)}
.scene-card-emoji{font-size:var(--3xl);margin-bottom:var(--s3);display:block}
.scene-card.hidden{display:none}
.sp{min-height:100dvh;padding:var(--s12) var(--s6);padding-top:calc(56px + var(--s8));position:relative;z-index:1}
.sp-inner{max-width:var(--cw);margin:0 auto}
.sp-back{display:inline-flex;align-items:center;gap:var(--s2);font-size:var(--sm);color:var(--text-2);margin-bottom:var(--s6);padding:var(--s2) var(--s4);border-radius:var(--r-full);transition:all .2s;border:none;background:none;cursor:pointer;font-family:var(--font-b)}.sp-back:hover{background:var(--accent-l);color:var(--accent)}
.sp-tag{display:inline-block;padding:4px 12px;border-radius:var(--r-full);font-size:var(--xs);font-weight:600;color:white;margin-bottom:var(--s4)}
.sp h1{font-family:var(--font-d);font-size:var(--4xl);font-weight:800;line-height:var(--lh-t);margin-bottom:var(--s3)}
.sp-desc{font-size:var(--lg);color:var(--text-2);margin-bottom:var(--s8);line-height:var(--lh-n)}
.prompt-box{background:var(--bg-code);border-radius:var(--r-md);margin:var(--s6) 0;overflow:hidden}
.prompt-bar{display:flex;align-items:center;justify-content:space-between;padding:var(--s3) var(--s4);background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.08)}
.prompt-bar-text{font-size:var(--xs);color:#6C7086;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.copy-btn{padding:4px 12px;border-radius:var(--r-full);font-size:var(--xs);font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#CDD6F4;font-family:var(--font-b);transition:all .2s}.copy-btn:hover{background:rgba(255,255,255,.15)}.copy-btn.copied{background:var(--success);border-color:var(--success);color:white}
.prompt-box pre{padding:var(--s6);color:#CDD6F4;font-family:var(--font-mono);font-size:var(--sm);line-height:1.8;white-space:pre-wrap;word-break:break-word;overflow-x:hidden;margin:0}
.ex-box{background:var(--surface);border:1px solid var(--border-l);border-radius:var(--r-md);margin:var(--s8) 0;overflow:hidden}
.ex-label{padding:var(--s3) var(--s4);font-size:var(--xs);font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border-l);background:var(--bg-warm)}
.chat-msg{display:flex;gap:var(--s3);padding:var(--s4) var(--s5)}.chat-msg+.chat-msg{border-top:1px solid var(--border-l)}
.chat-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:var(--xs);font-weight:700;color:white;flex-shrink:0}
.chat-user .chat-avatar{background:var(--c2)}.chat-ai .chat-avatar{background:var(--accent)}
.chat-msg p{font-size:var(--sm);line-height:var(--lh-n);color:var(--text)}.chat-ai p strong{color:var(--text)}
.collapse{border:1px solid var(--border-l);border-radius:var(--r-md);margin:var(--s6) 0;overflow:hidden}
.collapse-hd{display:flex;align-items:center;justify-content:space-between;padding:var(--s4) var(--s5);cursor:pointer;font-weight:600;font-size:var(--sm);transition:background .15s;user-select:none}.collapse-hd:hover{background:var(--bg-warm)}
.collapse-arrow{transition:transform var(--dur) var(--ease);font-size:var(--xs);color:var(--text-3)}.collapse.open .collapse-arrow{transform:rotate(180deg)}
.collapse-bd{max-height:0;overflow:hidden;transition:max-height var(--dur) var(--ease)}.collapse.open .collapse-bd{max-height:2000px}
.collapse-ct{padding:var(--s4) var(--s5);font-size:var(--sm);color:var(--text-2);line-height:var(--lh-n)}.collapse-ct ul{padding-left:var(--s5);margin:var(--s2) 0}.collapse-ct li{margin-bottom:var(--s2)}.collapse-ct strong{color:var(--text)}
.related{margin-top:var(--s8);padding-top:var(--s6);border-top:1px solid var(--border-l)}.related h4{font-size:var(--sm);font-weight:600;margin-bottom:var(--s3);color:var(--text-3)}
.related-list{display:flex;flex-wrap:wrap;gap:var(--s2)}
.related-link{padding:4px 12px;border-radius:var(--r-full);font-size:var(--xs);font-weight:600;color:var(--accent);border:1px solid var(--accent-l);transition:all .2s;cursor:pointer}.related-link:hover{background:var(--accent);color:white}
.ani{opacity:0;transform:translateY(20px);transition:opacity .5s var(--ease),transform .5s var(--ease)}.ani.vis{opacity:1;transform:translateY(0)}
#floating-toolbar{position:fixed;bottom:var(--s6);right:var(--s6);display:flex;gap:var(--s2);z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
#floating-toolbar.visible{opacity:1;pointer-events:auto}
#floating-toolbar button{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow-md);cursor:pointer;font-size:var(--lg);transition:all .2s;display:flex;align-items:center;justify-content:center}#floating-toolbar button:hover{background:var(--accent);color:white;border-color:var(--accent)}
.footer{text-align:center;padding:var(--s12) var(--s6);color:var(--text-3);font-size:var(--sm);position:relative;z-index:1;border-top:1px solid var(--border-l)}
@media(max-width:768px){.hero h1{font-size:var(--4xl)}.hero-stats{gap:var(--s6)}.hero-stat-num{font-size:var(--3xl)}.scene-grid{grid-template-columns:1fr}.sp h1{font-size:var(--2xl)}#search-input{width:140px}#search-input:focus{width:180px}#search-results{width:300px;right:-40px}.nav-title{display:none}}
@media(max-width:480px){.hero h1{font-size:var(--3xl)}.tag-filter{gap:var(--s1)}.tag-btn{padding:6px 14px;font-size:var(--xs)}}
@media print{.nav,#floating-toolbar,.tag-filter,.sp-back,.hero{display:none!important}.sp{min-height:auto;padding-top:0}.prompt-box{break-inside:avoid}}
</style>

<div class="hero ani"><div class="hero-badge">☕ 产品经理实战手册 · v4.0</div><h1>用 AI 做产品，<br>从<span class="accent">场景</span>出发</h1><p class="hero-sub">18 个开箱即用的 Prompt 模板，覆盖 PM 日常工作的高频场景。复制即用，无需提示词基础。</p><div class="hero-stats"><div class="hero-stat"><div class="hero-stat-num">18</div><div class="hero-stat-label">实战场景</div></div><div class="hero-stat"><div class="hero-stat-num">8</div><div class="hero-stat-label">技能模块</div></div><div class="hero-stat"><div class="hero-stat-num">100%</div><div class="hero-stat-label">可复制使用</div></div></div></div>

<script>
var M={
'基础':{label:'提示词基础',color:'var(--c1)',emoji:'📐'},
'角色':{label:'角色定义',color:'var(--c2)',emoji:'🎭'},
'上下文':{label:'上下文工程',color:'var(--c3)',emoji:'📦'},
'输出':{label:'结构化输出',color:'var(--c4)',emoji:'📊'},
'多轮':{label:'多轮对话',color:'var(--c5)',emoji:'🔄'},
'调优':{label:'提示词调优',color:'var(--c6)',emoji:'🔧'},
'协作':{label:'AI 协作',color:'var(--c7)',emoji:'🤝'},
'高级':{label:'高级技巧',color:'var(--c8)',emoji:'✨'}
};

var S=[
{id:'format-output',m:'基础',e:'📝',t:'让 AI 按格式输出',d:'最常见的痛点：AI 输出一大段文字，结构混乱。学会用格式约束，让输出直接可用。',
prompt:'你是一位产品经理助手。\n\n请帮我完成以下任务：\n\n**任务**：{{你的任务，如"整理以下用户反馈"}}\n\n**输入**：\n{{粘贴你的输入内容}}\n\n**输出要求**：\n1. 使用 Markdown 格式\n2. 用表格呈现核心数据\n3. 每个结论标注置信度（高/中/低）\n4. 最后给 3 条可执行的下一步建议\n5. 控制在 500 字以内',
u:'帮我整理这周收到的 12 条用户反馈。1）希望增加批量导出 2）编辑器加载太慢 3）能不能加个模板库 4）付费后还是有限制 5）移动端体验很差...',
a:'| 类别 | 反馈 | 频次 | 置信度 |\n|------|------|------|--------|\n| 功能缺失 | 批量导出 | 3次 | 高 |\n| 性能 | 加载慢 | 2次 | 高 |\n| 新需求 | 模板库 | 2次 | 中 |\n| 定价 | 付费限制 | 2次 | 中 |\n| 体验 | 移动端差 | 3次 | 高 |\n\n下一步：🔴 P0 优化移动端+加载 🟡 P1 评估批量导出 🟢 P2 模板库MVP',
w:['<b>格式约束 = 输出质量</b>：明确告诉 AI 用什么格式，输出立刻结构化','<b>字数限制</b>：控制输出长度，避免冗长发散','<b>置信度标注</b>：让 AI 自我评估，帮你判断可靠性'],
r:['role-expert','fuzzy-to-precise']},

{id:'role-expert',m:'基础',e:'🎭',t:'让 AI 扮演专家',d:'给 AI 一个专业角色，它就会用那个领域的思维框架来回答，输出质量显著提升。',
prompt:'你是一位{{专家角色，如"10年经验的数据产品经理"}}。\n\n**背景**：{{你的问题背景，1-2 句}}\n\n**问题**：{{具体问题}}\n\n请从以下角度分析：\n1. {{维度1，如"数据层面"}}\n2. {{维度2，如"产品策略层面"}}\n3. {{维度3，如"落地执行层面"}}\n\n给出具体可执行的建议，避免泛泛而谈。',
u:'你是一位10年经验的增长产品经理。我们的产品是 AI 图片工具，月活 50 万，付费率 6%，想提升到 10%。免费版功能多，付费版只多了批量处理和去水印。',
a:'<b>1. 数据层面</b>：付费率 6%→10% 需新增 2 万付费。关键卡点可能在"免费版够用"。\n\n<b>2. 产品策略</b>：\n- 免费版：每天 5 次生成（从无限削减）\n- 付费版：无限 + 批量 + API\n- 核心：让"不够用"驱动付费\n\n<b>3. 执行层面（90天）</b>：\nWeek 1-2 埋点+基线 → Week 3-4 AB测试 → Month 2 新付费层级 → Month 3 优化 onboarding',
w:['<b>角色定义是最简单有效的技巧</b>：10 个字的角色设定，输出质量差异巨大','<b>维度引导</b>：指定分析角度，避免 AI 单一视角','<b>"避免泛泛而谈"</b>：有效减少套话'],
r:['format-output','ai-consultant']},

{id:'ai-consultant',m:'角色',e:'💼',t:'AI 产品顾问',d:'把 AI 变成你的产品顾问，用于方案评审、决策分析、策略讨论。',
prompt:'你是一位资深产品总监，有 15 年互联网产品经验，擅长战略规划和团队管理。\n\n**我的角色**：{{你的角色}}\n**产品**：{{产品名}} - {{一句话描述}}\n**阶段**：{{如"从 0 到 1"或"快速增长期"}}\n\n**当前问题**：\n{{描述你面临的决策或困惑，2-3 句}}\n\n**请**：\n1. 先澄清你认为我可能忽略的关键问题（1-2 个）\n2. 给出你的判断和建议（带理由）\n3. 指出这个决策的风险和应对方案\n4. 如果建议不可行，给出 Plan B',
u:'我是 WHEE 的产品经理。正在做 AI 视频生成功能，老板要求 2 个月上线，技术说至少 4 个月。',
a:'<b>先澄清</b>：老板说的"2 个月上线"是指 MVP 还是功能完整？\n\n<b>MVP 2个月</b>：1种风格 + 15秒限制 + 第三方API\n<b>完整版 4个月</b>：多风格 + 模板 + 自研模型\n\n<b>风险</b>：MVP 体验太差毁了第一印象\n<b>应对</b>：限量灰度，种子用户先行\n<b>Plan B</b>：做"预约页面"收集需求',
w:['<b>"先澄清"机制</b>：让 AI 发现你忽略的前提假设','<b>Plan B</b>：要求备选方案，避免单点依赖','<b>角色深度</b>："15年+擅长战略"比"产品经理"精准得多'],
r:['role-expert','user-review-sim']},

{id:'user-review-sim',m:'角色',e:'👥',t:'AI 模拟用户评审',d:'让 AI 扮演不同类型的真实用户，对你的方案做"模拟评审"，发现盲点。',
prompt:'请扮演以下 3 种用户角色，对我的产品方案进行评审：\n\n**产品方案**：\n{{粘贴方案摘要，3-5 句}}\n\n**评审角色**：\n1. **小白用户**：第一次用这类产品，靠直觉操作\n2. **重度用户**：每天使用，对效率极其敏感\n3. **付费决策者**：公司采购负责人，关注 ROI、安全和可靠性\n\n**请对每个角色分别回答**：\n- 核心价值是什么？\n- 最可能的 3 个吐槽点\n- 什么情况下会弃用/拒绝？\n- 给产品团队的建议（1 条）',
u:'AI 写作助手：输入一段话，AI 自动优化文笔。定价：免费每天 5 次，Pro 版 $9.9/月无限。',
a:'<b>🧑 小白用户</b>：价值=不会写也能写好。吐槽：不像我写的/不知道输入什么/5次太少。\n<b>🔥 重度用户</b>：价值=批量处理。吐槽：没批量导入/没自定义风格/没API。\n<b>💼 付费决策者</b>：价值=团队标准化。吐槽：数据安全？/没团队后台/年费$6000值吗？\n\n建议：加语气选择+API+企业版',
w:['<b>多角色模拟 = 多角度盲点检测</b>','<b>"吐槽点"比优点更有价值</b>','<b>付费决策者是独立维度</b>：掏钱的人和用的不是同一个人'],
r:['ai-consultant','iterate-solution']},

{id:'feed-context',m:'上下文',e:'📋',t:'给 AI 喂项目背景',d:'AI 的输出质量取决于你给的上下文质量。学会结构化地提供背景信息。',
prompt:'我需要你帮我完成一个产品决策。请先阅读以下背景信息：\n\n## 公司与产品\n- 公司：{{公司名}}，{{公司阶段}}\n- 产品：{{产品名}}，{{一句话描述}}\n- 核心指标：{{如"月活 50 万，付费率 6%"}}\n- 竞品：{{主要竞品}}\n\n## 当前阶段\n- {{如"正在做商业化转型"}}\n- {{如"技术团队 20 人，产品团队 5 人"}}\n\n## 我的具体问题\n{{2-3 句描述你要解决的问题}}\n\n请基于以上背景给出分析，不要给出与背景矛盾的通用建议。',
u:'公司：美图，上市公司。产品：WHEE，AI 图片编辑，海外为主。月活 500 万，付费率 4%。竞品：Remini、Lensa。问题：做 AI 视频生成还是 AI 图片增强？',
a:'<b>判断：先做图片增强</b>\n1. 用户心智匹配：WHEE 用户找"修图"不是"做视频"\n2. 转化路径更短：修图好→立即付费\n3. 技术风险低：图片增强有成熟方案\n4. Remini 已做视频增强，需差异化\n\n<b>建议</b>：Q1 图片增强 MVP → Q2 根据数据决定视频',
w:['<b>结构化背景 = 精准输出</b>：标题+要点让 AI 精准提取','<b>"不要与背景矛盾"</b>：防止输出套话','<b>竞品信息是高价值上下文</b>'],
r:['ai-understand-data','ai-consultant']},

{id:'ai-understand-data',m:'上下文',e:'📈',t:'AI 理解产品数据',d:'把数据丢给 AI，让它帮你发现异常、找出趋势、给出洞察。',
prompt:'你是一位数据分析专家。\n\n**数据概况**：\n{{用表格列出数据\n| 指标 | 上周 | 本周 | 变化 |\n|------|------|------|------|\n| DAU | 12 万 | 11.5 万 | -4.2% |\n}}\n\n**背景**：{{如"上周上线了新功能 X"}}\n\n**请**：\n1. 找出数据中最大的异常点\n2. 分析可能的原因（至少 2 个假设）\n3. 给出验证假设的方法\n4. 建议下一步行动（优先级排序）',
u:'DAU: 12万→11.5万(-4.2%) | 新用户: 3.2万→2.1万(-34%) | 7日留存: 28%→29%(+1pp) | 付费: 1800→1750(-2.8%)\n背景：上周 onboarding 从 5 步改成 3 步',
a:'<b>最大异常</b>：新用户暴跌 34%\n\n<b>假设1</b>：新 onboarding 导致困惑（留存↑说明到达核心功能比例更高）→ 验证：看每一步漏斗\n<b>假设2</b>：外部渠道波动 → 验证：按渠道拆分\n\n<b>下一步</b>：🔴 今天拉漏斗 → 🟡 本周拆渠道 → 🟢 下周 AB测试回滚',
w:['<b>结构化数据输入</b>：表格让 AI 精准识别趋势','<b>"至少 2 个假设"</b>：强制多角度思考','<b>优先级排序</b>：从"分析"变成"行动"'],
r:['feed-context','data-monitor']},

{id:'prd-output',m:'输出',e:'📄',t:'AI 输出 PRD',d:'用 AI 快速产出 PRD 初稿，节省 60% 的文档时间。',
prompt:'你是一位资深产品经理，请帮我写一份 PRD。\n\n## 基本信息\n- **产品**：{{产品名}}\n- **功能名称**：{{功能名}}\n- **目标用户**：{{目标用户}}\n- **背景**：{{为什么做这个功能，2-3 句}}\n\n## 功能描述\n{{描述你要做的功能}}\n\n## 请按以下结构输出：\n\n### 1. 问题定义\n- 用户痛点（3 个）\n- 业务目标（1-2 个可量化的 KPI）\n\n### 2. 解决方案概述\n- 核心交互流程（3-5 步）\n- 关键功能点（5-8 个）\n\n### 3. 功能详细设计\n| 功能点 | 描述 | 优先级 | 验收标准 |\n\n### 4. 非功能需求\n- 性能要求、数据埋点\n\n### 5. 成功指标\n| 指标 | 基线 | 目标 | 衡量周期 |\n\n### 6. 风险与应对\n| 风险 | 可能性 | 影响 | 应对方案 |\n\n### 7. Out of Scope\n- 明确不在范围内的事项（3-5 条）\n\n### 8. 里程碑\n| 阶段 | 时间 | 交付物 |',
u:'产品：WHEE。功能：AI 一键换背景。用户：电商卖家、社交媒体用户。背景："换背景"是Top3需求，手动抠图门槛高。',
a:'<b>问题定义</b>：痛点：手动抠图耗时/门槛高/手机端无好工具。KPI：功能使用率>15%，付费+0.5pp\n<b>方案</b>：上传→AI识别主体→选背景→生成。功能：主体识别、背景分割、预设模板、批量(付费)\n<b>风险</b>：复杂图片不准→手动微调 | 模型成本高→限制免费次数\n<b>Out of Scope</b>：视频换背景、实时换背景、API',
w:['<b>结构化模板 = AI 知道该写什么</b>：章节标题让 PRD 完整不遗漏','<b>Out of Scope 很关键</b>：PM 最容易忽略"不做什么"','<b>成功指标前置</b>：写 PRD 时就想好怎么衡量'],
r:['comp-table','iterate-solution']},

{id:'comp-table',m:'输出',e:'📊',t:'AI 生成竞品对比表',d:'让 AI 产出结构化的竞品对比矩阵，快速建立竞品认知。',
prompt:'你是一位商业化产品经理，擅长竞品分析。\n\n请帮我做 {{我们的产品名}} 与竞品的对比分析：\n\n**我们的产品**：{{一句话描述 + 核心数据}}\n**竞品**：{{列出 2-4 个竞品}}\n\n**请按以下维度用表格输出**：\n| 维度 | 我们 | {{竞品1}} | {{竞品2}} |\n\n维度包括：\n1. 核心定位（一句话）\n2. 目标用户\n3. 定价（免费版/付费版）\n4. 核心功能（Top 5）\n5. 商业化模式\n6. 增长策略\n7. 差异化优势\n8. 我们的可借鉴点',
u:'我们：WHEE，AI 图片编辑，海外为主，月活500万，付费率4%。竞品：Remini、Lensa、Photoleap。',
a:'| 维度 | WHEE | Remini | Lensa |\n|------|------|--------|-------|\n| 定位 | AI图片编辑 | AI照片增强 | AI艺术头像 |\n| 定价 | $3.99/w | $5.99/w | $5.99/w |\n| 模式 | Freemium | 订阅 | 订阅 |\n\n<b>可借鉴</b>：Remini"前后对比"分享机制（天然裂变）+ Lensa 限时活动定价',
w:['<b>表格对比 = 一目了然</b>：比文字描述高效10倍','<b>固定维度框架</b>：确保对比不遗漏','<b>"可借鉴点"是核心输出</b>：竞品分析的目的是为我所用'],
r:['prd-output','comp-full']},

{id:'iterate-solution',m:'多轮',e:'🔄',t:'迭代优化方案',d:'不要期望一次得到完美答案。学会用多轮对话逐步深化和优化 AI 的输出。',
prompt:'（第 1 轮）\n{{给出你的初始问题或方案}}\n\n---\n（第 2 轮 — 在 AI 回复后追问）\n上面的分析很有帮助。但我想针对 {{某个具体点}} 深入讨论。\n\n具体来说：{{补充信息或疑问}}\n\n请：\n1. 重新评估你在 {{该点}} 上的结论\n2. 给出更细致的分析\n\n---\n（第 3 轮 — 收敛到行动）\n很好。请帮我把这个分析转化为可执行的行动计划：\n\n**约束条件**：\n- 团队：{{人数和配置}}\n- 时间：{{可用时间}}\n- 资源：{{限制条件}}\n\n请输出一个按周拆解的执行计划。',
u:'[第1轮] 我要给WHEE设计AI一键生成产品图。\n[第2轮] 只有2周时间，帮我砍到MVP。\n[第3轮] 团队2前端1后端，帮我拆成2周任务。',
a:'<b>第1轮</b>：AI 给出完整功能规划和分期\n<b>第2轮</b>：收敛MVP — 只保留主体识别+5预设背景+一键生成\n<b>第3轮</b>：Week1 D1-2模型选型 D3-5前端核心UI | Week2 D1-3联调 D4-5灰度+埋点',
w:['<b>多轮对话 = 逐步收敛</b>：从发散→聚焦→执行','<b>"约束条件"是收敛关键</b>：给团队/时间限制，AI 才能给出可执行计划','<b>追问技巧</b>：针对具体点深入，不要问"还有什么建议"'],
r:['step-decompose','iterate-stable']},

{id:'step-decompose',m:'多轮',e:'✂️',t:'分步拆解需求',d:'把大需求拆成小任务，让 AI 一步步执行，每步都可检查和调整。',
prompt:'我有一个比较大的需求需要拆解。请帮我分步完成。\n\n**大需求**：{{描述你的需求，2-3 句}}\n\n**请先做第 1 步**：\n帮我把这个需求拆成 5-8 个可独立执行的小任务，每个任务包含：\n- 任务名称\n- 输入（需要什么）\n- 输出（产出什么）\n- 预估工作量（S/M/L）\n- 依赖关系\n\n用表格输出。完成第 1 步后我会逐个确认。',
u:'我要做一个完整的商业化策略方案，覆盖定价、增长、留存。产品是 WHEE，月活 500 万，付费率 4%。',
a:'| # | 任务 | 输入 | 输出 | 工作量 | 依赖 |\n|---|------|------|------|--------|------|\n| 1 | 用户价值分层 | 行为数据 | 分层模型 | M | - |\n| 2 | 竞品定价研究 | 定价数据 | 对标表 | S | - |\n| 3 | 付费功能排序 | 使用+转化 | 价值矩阵 | M | 1 |\n| 4 | 定价方案设计 | 2+3结果 | 2-3套方案 | L | 2,3 |\n| 5 | 增长渠道分析 | 获客数据 | ROI表 | M | 1 |\n| 6 | 留存归因分析 | 留存+行为 | 驱动因素 | M | 1 |\n| 7 | 综合策略整合 | 4+5+6 | 完整方案 | L | 4,5,6 |\n\n确认后我们逐个深入。',
w:['<b>"请先做第1步"</b>：限制 AI 一次只做一件事，质量更高','<b>依赖关系</b>：让 AI 自己理清执行顺序','<b>逐步确认</b>：每步都可检查和调整'],
r:['iterate-solution','comp-full']},

{id:'fuzzy-to-precise',m:'调优',e:'🎯',t:'模糊需求→精准 Prompt',d:'大多数人给 AI 的指令太模糊。学会把模糊想法转化为精准的 Prompt。',
prompt:'以下是一个模糊的需求描述，请帮我转化为一个精准的 Prompt：\n\n**模糊需求**：{{如"帮我做个竞品分析"}}\n\n**请输出**：\n1. 这个模糊需求背后可能的 3 种具体意图\n2. 为每种意图写一个完整的、可直接使用的 Prompt\n3. 推荐最适合当前场景的那个，并说明原因\n\n每个 Prompt 需要包含：角色定义、背景信息、具体任务、输出格式、约束条件。',
u:'帮我做个竞品分析',
a:'<b>3 种意图</b>：\n1. 商业决策型 — 竞品定价和模式对比\n2. 功能对标型 — 功能矩阵和差异化\n3. 市场进入型 — 竞品格局和市场机会\n\n<b>推荐意图1</b>（最常见的PM场景）的 Prompt：\n"你是一位商业化产品经理。请帮我分析 {{竞品}} 的定价策略..."（完整版见"竞品分析"场景）\n\n<b>原因</b>：大多数PM做竞品分析是为了自己的商业化决策，不是学术研究',
w:['<b>模糊→精准是最实用的调优技巧</b>：先弄清自己到底要什么','<b>多种意图</b>：同一个模糊需求可能对应完全不同的任务','<b>"可直接使用"</b>：调优的终极目标是产出可执行的 Prompt'],
r:['format-output','iterate-stable']},

{id:'iterate-stable',m:'调优',e:'⚙️',t:'让输出更稳定',d:'同一个 Prompt 多次运行结果不一致？学会用锚定和约束来提高输出的稳定性。',
prompt:'你是一位{{角色}}。\n\n请帮我完成以下任务：\n\n**任务**：{{具体任务}}\n\n**输出要求**：\n1. 严格按照以下模板输出，不要添加额外内容：\n\n{{模板，例如：\n## 核心结论\n[1-3 句结论]\n\n## 支撑数据\n| 数据点 | 来源 | 备注 |\n\n## 建议行动\n1. [行动] — 原因\n2. [行动] — 原因\n}\n\n2. 如果信息不足，明确标注"[待确认]"，不要猜测\n3. 每个结论只保留最重要的一个数据点支撑\n4. 建议不超过 5 条，按优先级排序',
u:'角色：增长产品经理。任务：分析为什么WHEE付费率从4%降到了3.5%。',
a:'<b>核心结论</b>：\n1. 付费率下降主因是新用户付费转化降低（从2.1%到1.5%）[待确认：是否受竞品影响]\n2. 老用户续费率基本稳定（92%→91%），不是主要因素\n\n<b>支撑数据</b>\n| 数据点 | 趋势 | 备注 |\n|------|------|------|\n| 新用户转化 | 2.1%→1.5% | 最大贡献 |\n| 老用户续费 | 92%→91% | 波动正常 |\n| 付费墙触达 | 65%→62% | 需排查 |\n\n<b>建议行动</b>：\n1. 排查付费墙触达率下降原因 — P0\n2. AB测试新用户付费引导 — P1\n3. 监控竞品动态 — P2',
w:['<b>严格模板 = 稳定输出</b>：AI 在模板内的自由度越低，输出越稳定','<b>"不要猜测"</b>：信息不足时标注，比瞎编好100倍','<b>"每个结论一个数据点"</b>：防止 AI 用多个弱证据堆砌'],

{id:'comp-full',m:'协作',e:'🔍',t:'竞品分析全流程',d:'用一个完整的 Prompt 串联竞品分析的全流程：从信息收集到策略建议。',

// ========== RENDER ==========
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function renderHome(){
  var tf=document.getElementById('tag-filter');
  tf.innerHTML='<button class="tag-btn active" data-tag="all">全部</button>';
  Object.keys(M).forEach(function(k){tf.innerHTML+='<button class="tag-btn" data-tag="'+k+'">'+M[k].emoji+' '+M[k].label+'</button>'});
  tf.querySelectorAll('.tag-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      tf.querySelectorAll('.tag-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');
      filterScenes(btn.dataset.tag);
    });
  });
  renderSceneList('all');
}

function filterScenes(tag){
  document.querySelectorAll('.scene-group').forEach(function(g){g.style.display='none'});
  document.querySelectorAll('.scene-card').forEach(function(c){c.classList.add('hidden')});
  if(tag==='all'){
    document.querySelectorAll('.scene-group').forEach(function(g){g.style.display='';g.querySelectorAll('.scene-card').forEach(function(c){c.classList.remove('hidden')})});
  }else{
    document.querySelectorAll('.scene-group').forEach(function(g){
      if(g.dataset.module===tag){g.style.display='';g.querySelectorAll('.scene-card').forEach(function(c){c.classList.remove('hidden')})}
    });
  }
}

function renderSceneList(tag){
  var container=document.getElementById('scenes-container');
  var html='';
  var order=Object.keys(M);
  order.forEach(function(mk){
    var items=S.filter(function(s){return s.m===mk});
    if(tag!=='all'&&tag!==mk)return;
    html+='<div class="scene-group" data-module="'+mk+'">';
    html+='<div class="scene-group-label">'+M[mk].emoji+' '+M[mk].label+'</div>';
    html+='<div class="scene-grid">';
    items.forEach(function(s){
      html+='<div class="scene-card" onclick="openScene(\''+s.id+'\')">';
      html+='<span class="scene-card-emoji">'+s.e+'</span>';
      html+='<span class="scene-card-tag" style="background:'+M[mk].color+'">'+M[mk].label+'</span>';
      html+='<h3>'+esc(s.t)+'</h3>';
      html+='<p>'+esc(s.d)+'</p>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  container.innerHTML=html;
}

function findScene(id){return S.filter(function(s){return s.id===id})[0]}

function openScene(id){
  var s=findScene(id);if(!s)return;
  var mod=M[s.m];
  var relHtml='';
  if(s.r&&s.r.length){
    relHtml='<div class="related"><h4>🔗 相关场景</h4><div class="related-list">';
    s.r.forEach(function(rid){
      var rs=findScene(rid);
      if(rs)relHtml+='<a class="related-link" onclick="openScene(\''+rid+'\')">'+rs.e+' '+esc(rs.t)+'</a>';
    });
    relHtml+='</div></div>';
  }
  var whyHtml='';
  if(s.w&&s.w.length){
    whyHtml='<div class="collapse" onclick="this.classList.toggle(\'open\')"><div class="collapse-hd"><span>🧠 为什么这个 Prompt 有效？</span><span class="collapse-arrow">▼</span></div><div class="collapse-bd"><div class="collapse-ct"><ul>';
    s.w.forEach(function(w){whyHtml+='<li>'+w+'</li>'});
    whyHtml+='</ul></div></div></div>';
  }
  var html='<div class="sp"><div class="sp-inner ani vis">';
  html+='<button class="sp-back" onclick="showHome()">← 返回场景列表</button>';
  html+='<span class="sp-tag" style="background:'+mod.color+'">'+mod.emoji+' '+mod.label+'</span>';
  html+='<h1>'+s.e+' '+esc(s.t)+'</h1>';
  html+='<p class="sp-desc">'+esc(s.d)+'</p>';
  html+='<div class="prompt-box"><div class="prompt-bar"><span class="prompt-bar-text">📋 PROMPT（可复制）</span><button class="copy-btn" onclick="copyPrompt(this)">复制</button></div><pre>'+esc(s.prompt)+'</pre></div>';
  html+='<div class="ex-box"><div class="ex-label">💬 真实示例</div>';
  html+='<div class="chat-msg chat-user"><div class="chat-avatar">你</div><p>'+esc(s.u)+'</p></div>';
  html+='<div class="chat-msg chat-ai"><div class="chat-avatar">AI</div><p>'+s.a.replace(/\n/g,'<br>')+'</p></div>';
  html+='</div>';
  html+=whyHtml;
  html+=relHtml;
  html+='</div></div>';

  document.getElementById('home').style.display='none';
  var spc=document.getElementById('spc');
  spc.style.display='block';
  spc.innerHTML=html;
  window.scrollTo({top:0,behavior:'instant'});
  localStorage.setItem('pm-scene-last',id);
}

function showHome(){
  document.getElementById('home').style.display='';
  document.getElementById('spc').style.display='none';
  window.scrollTo({top:0,behavior:'instant'});
}

// ========== COPY ==========
window.copyPrompt=function(btn){
  var box=btn.closest('.prompt-box');
  var pre=box.querySelector('pre');
  if(!pre)return;
  var text=pre.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){btn.textContent='已复制 ✓';btn.classList.add('copied');setTimeout(function(){btn.textContent='复制';btn.classList.remove('copied')},2000)});
  }else{
    var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');btn.textContent='已复制 ✓';btn.classList.add('copied');setTimeout(function(){btn.textContent='复制';btn.classList.remove('copied')},2000)}catch(e){btn.textContent='失败'}document.body.removeChild(ta);
  }
};

// ========== THEME ==========
var themeBtn=document.getElementById('theme-toggle'),savedTheme=localStorage.getItem('pm-scene-theme')||'light';
document.documentElement.dataset.theme=savedTheme;themeBtn.textContent=savedTheme==='dark'?'☀️':'🌙';
themeBtn.addEventListener('click',function(){var c=document.documentElement.dataset.theme,n=c==='dark'?'light':'dark';document.documentElement.dataset.theme=n;themeBtn.textContent=n==='dark'?'☀️':'🌙';localStorage.setItem('pm-scene-theme',n);});

// ========== PROGRESS ==========
var navEl=document.querySelector('.nav'),toolbar=document.getElementById('floating-toolbar'),progressBar=document.getElementById('progress-bar'),lastProg=0;
function updateProgress(){
  var st=window.scrollY,sh=document.documentElement.scrollHeight-window.innerHeight,p=sh>0?(st/sh)*100:0;
  if(Math.abs(p-lastProg)>0.5){lastProg=p;progressBar.style.width=p+'%'}
  if(st>100)navEl.classList.add('scrolled');else navEl.classList.remove('scrolled');
  if(st>window.innerHeight)toolbar.classList.add('visible');else toolbar.classList.remove('visible');
}
window.addEventListener('scroll',function(){requestAnimationFrame(updateProgress)},{passive:true});

// ========== RESUME ==========
var resumeBtn=document.getElementById('nav-resume');
var lastScene=localStorage.getItem('pm-scene-last');
if(lastScene){resumeBtn.style.display='inline-block'}
window.resumeProgress=function(){if(lastScene)openScene(lastScene)};

// ========== ANIMATE ==========
var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target)}})},{rootMargin:'50px'});
document.querySelectorAll('.ani').forEach(function(el){obs.observe(el)});

// ========== SEARCH ==========
var searchInput=document.getElementById('search-input'),searchResults=document.getElementById('search-results');
function debounce(fn,ms){var t;return function(){clearTimeout(t);t=setTimeout(fn,ms)}}
searchInput.addEventListener('input',debounce(function(){
  var q=searchInput.value.trim().toLowerCase();
  if(!q){searchResults.classList.remove('show');return}
  var matches=S.filter(function(s){return(s.t+s.d+s.m).toLowerCase().indexOf(q)!==-1});
  if(!matches.length){searchResults.innerHTML='<div class="sr-empty">没有找到匹配结果</div>'}
  else{
    var h='<div class="sr-header">'+matches.length+' 个结果</div>';
    matches.forEach(function(s){
      h+='<div class="sr-item" onclick="openScene(\''+s.id+'\');searchResults.classList.remove(\'show\');searchInput.value=\'\'"><code>'+s.e+' '+esc(s.t)+'</code><span class="sr-tag" style="background:'+M[s.m].color+'">'+M[s.m].label+'</span><span class="sr-desc">'+esc(s.d)+'</span></div>';
    });
    h+='<div class="sr-hint">Esc 关闭 · Ctrl/Cmd+K 搜索</div>';
    searchResults.innerHTML=h;
  }
  searchResults.classList.add('show');
},200));
document.addEventListener('keydown',function(e){
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();searchInput.focus()}
  if(e.key==='Escape'){searchResults.classList.remove('show');searchInput.blur()}
});
