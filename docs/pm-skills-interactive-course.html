<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM AI Skill 工具箱</title>
<style>
:root{--bg:#FAFAFA;--bg2:#F5F5F5;--card:#fff;--text:#1a1a1a;--text2:#666;--text3:#999;--brand:#6C5CE7;--brand-light:#A29BFE;--brand-bg:rgba(108,92,231,.08);--border:#E8E8E8;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-lg:0 4px 12px rgba(0,0,0,.08);--radius:16px;--radius2:12px;--code-bg:#1E1E2E;--code-text:#CDD6F4}
.dark{--bg:#0F0F14;--bg2:#1A1A24;--card:#1E1E2E;--text:#E4E4E7;--text2:#9CA3AF;--text3:#6B7280;--brand:#A29BFE;--brand-light:#C4B5FD;--brand-bg:rgba(162,155,254,.1);--border:#2D2D3D;--shadow:0 1px 3px rgba(0,0,0,.2);--shadow-lg:0 4px 12px rgba(0,0,0,.3);--code-bg:#16161E}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:24px 20px 60px}
.header{text-align:center;padding:40px 0 32px}
.header h1{font-size:28px;font-weight:700;margin-bottom:6px}
.header p{color:var(--text2);font-size:15px}
.search-box{max-width:480px;margin:0 auto 24px;position:relative}
.search-box input{width:100%;padding:12px 16px 12px 44px;border:1px solid var(--border);border-radius:var(--radius2);background:var(--card);color:var(--text);font-size:15px;outline:none;transition:all .2s}
.search-box input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-bg)}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3)}
.categories{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:32px}
.cat-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
.cat-btn:hover{border-color:var(--brand);color:var(--brand)}
.cat-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.dark .cat-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;cursor:pointer;transition:all .2s}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--brand-light)}
.card .cat-tag{font-size:11px;color:var(--brand);font-weight:600;letter-spacing:.5px;margin-bottom:10px}
.card h3{font-size:17px;font-weight:600;margin-bottom:6px}
.card .desc{color:var(--text2);font-size:13px;margin-bottom:16px;line-height:1.5}
.card .meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.card .meta .level{padding:2px 8px;border-radius:6px;background:var(--brand-bg);color:var(--brand);font-weight:500}
.theme-toggle{position:fixed;top:16px;right:16px;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:100}
.detail{max-width:600px;margin:0 auto}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:14px;cursor:pointer;margin-bottom:24px;background:none;border:none}
.back-btn:hover{color:var(--brand)}
.detail h2{font-size:24px;font-weight:700;margin-bottom:8px}
.detail .detail-desc{color:var(--text2);font-size:15px;margin-bottom:28px}
.step-indicator{display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:14px;color:var(--text3)}
.step-indicator .current{color:var(--brand);font-weight:600}
.step-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.step-bar .fill{height:100%;background:var(--brand);border-radius:2px;transition:width .3s}
.step-title{font-size:18px;font-weight:600;margin-bottom:20px}
.field{margin-bottom:20px}
.field label{display:block;font-size:14px;font-weight:500;margin-bottom:8px}
.field input[type="text"],.field textarea{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius2);background:var(--card);color:var(--text);font-size:15px;outline:none;transition:all .2s;font-family:inherit}
.field input:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-bg)}
.field textarea{min-height:100px;resize:vertical}
.tag-group{display:flex;flex-wrap:wrap;gap:8px}
.tag-option{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:14px;cursor:pointer;transition:all .2s;user-select:none}
.tag-option:hover{border-color:var(--brand-light);color:var(--brand)}
.tag-option.selected{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-row{display:flex;justify-content:space-between;margin-top:32px}
.btn{padding:12px 24px;border-radius:var(--radius2);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--text3)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.result{max-width:640px;margin:0 auto}
.result .check{font-size:28px;margin-bottom:12px}
.result h2{font-size:22px;font-weight:700;margin-bottom:20px}
.prompt-block{background:var(--code-bg);border-radius:var(--radius2);padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.prompt-block::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--brand);border-radius:4px 0 0 4px}
.prompt-block pre{color:var(--code-text);font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-word;font-family:'SF Mono','Fira Code',monospace;margin:0}
.result-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.tips{background:var(--brand-bg);border-radius:var(--radius2);padding:20px}
.tips h4{font-size:14px;margin-bottom:10px;color:var(--brand)}
.tips li{font-size:13px;color:var(--text2);margin-bottom:4px;padding-left:4px}
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:15px}
@media(max-width:640px){.header h1{font-size:22px}.grid{grid-template-columns:1fr}.container{padding:16px 16px 40px}.header{padding:24px 0 20px}.btn-row{flex-direction:column;gap:10px}.btn{width:100%;text-align:center}.result-actions{flex-direction:column}}
.hidden{display:none!important}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>
<div class="container">
<div id="home">
<div class="header"><h1>PM AI Skill 工具箱</h1><p>产品经理的 AI 技能库 · 选场景，答问题，生成专属 Prompt</p></div>
<div class="search-box"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="search" placeholder="搜索场景…" oninput="filterCards()"></div>
<div class="categories" id="cats"></div>
<div class="grid" id="grid"></div>
</div>
<div id="detail" class="detail hidden"></div>
<div id="result" class="result hidden"></div>
</div>
<script>
const skills=[
{id:'competitor-feature',category:'竞品分析',title:'竞品功能对比',desc:'输入产品名，AI 帮你生成结构化功能对比矩阵',level:'入门',
steps:[
{title:'你要对比哪两个产品？',fields:[{key:'productA',label:'产品 A',type:'text',placeholder:'如：TikTok'},{key:'productB',label:'产品 B',type:'text',placeholder:'如：Instagram Reels'}]},
{title:'你想重点对比哪些方面？',fields:[{key:'dimensions',type:'checkbox',options:['核心功能','用户体验','变现模式','用户增长','技术架构','市场定位'],defaults:['核心功能','用户体验']}]},
{title:'补充你的背景信息（可选）',fields:[{key:'context',label:'你的产品/背景',type:'textarea',placeholder:'如：我正在做一个短视频社交产品，面向 Z 世代用户'}]}
],
prompt:d=>`你是一个资深产品经理，擅长竞品分析。\n\n请对比以下两个产品：\n· ${d.productA}\n· ${d.productB}\n\n重点对比维度：\n${d.dimensions.map(v=>'· '+v).join('\n')}\n\n${d.context?'我的背景：'+d.context+'\n\n':''}请按以下结构输出：\n1. 市场定位对比\n2. 核心功能对比矩阵（用表格）\n3. 用户体验差异\n4. 差异化分析\n5. 结论与建议`,
tips:['把生成的 Prompt 粘贴到 ChatGPT 或 DeepSeek','可以追问"帮我补充用户评价方面的对比"','建议使用 GPT-4 或 Claude 获得最佳效果']},

{id:'competitor-pricing',category:'竞品分析',title:'竞品定价分析',desc:'对比竞品定价策略，找到定价机会点',level:'进阶',
steps:[
{title:'你要分析哪些产品的定价？',fields:[{key:'products',label:'产品列表',type:'textarea',placeholder:'每行一个，如：\nNotion\nCoda\nObsidian'},{key:'market',label:'目标市场',type:'text',placeholder:'如：全球 SaaS 市场'}]},
{title:'你已有的定价信息（可选）',fields:[{key:'pricing',label:'已知定价信息',type:'textarea',placeholder:'如：Notion 免费/$8/$15'}]},
{title:'你的分析重点是什么？',fields:[{key:'focus',type:'checkbox',options:['定价模型对比','价格区间分析','功能与价格关系','用户分层策略','免费版策略'],defaults:['定价模型对比','价格区间分析']}]}
],
prompt:d=>`你是一个资深的 SaaS 产品经理，擅长定价策略分析。\n\n请分析以下产品的定价策略：\n${d.products.split('\n').filter(Boolean).map(v=>'· '+v).join('\n')}\n\n目标市场：${d.market}\n${d.pricing?'已知定价信息：\n'+d.pricing+'\n\n':''}重点分析维度：\n${d.focus.map(v=>'· '+v).join('\n')}\n\n请按以下结构输出：\n1. 各产品定价概览（表格）\n2. 定价模型对比分析\n3. 价格-功能对应关系\n4. 目标用户分层策略\n5. 定价机会与建议`,
tips:['不知道竞品定价也没关系，AI 会基于公开信息分析','追问"如果我要做低价切入，怎么定价合适"']},

{id:'competitor-tracking',category:'竞品分析',title:'竞品动态追踪',desc:'生成竞品监控框架，系统化追踪竞品变化',level:'入门',
steps:[
{title:'你要追踪哪些竞品？',fields:[{key:'competitors',label:'竞品列表',type:'textarea',placeholder:'每行一个，如：\nFigma\nSketch\nAdobe XD'}]},
{title:'你关注的动态类型？',fields:[{key:'trackTypes',type:'checkbox',options:['产品更新','新功能发布','定价变化','市场活动','融资动态','团队变化','用户评价'],defaults:['产品更新','新功能发布','定价变化']}]}
],
prompt:d=>`你是一个资深产品经理，擅长竞品情报收集与分析。\n\n请帮我建立一个竞品动态追踪框架：\n\n追踪目标：\n${d.competitors.split('\n').filter(Boolean).map(v=>'· '+v).join('\n')}\n\n重点追踪类型：\n${d.trackTypes.map(v=>'· '+v).join('\n')}\n\n请输出：\n1. 信息来源清单（每个竞品推荐 5-8 个信息渠道）\n2. 追踪频率建议\n3. 动态分类标签体系\n4. 一份可直接使用的竞品动态周报模板\n5. 关键信号识别指南`,
tips:['可以把生成的追踪框架放入 Notion / 飞书多维表格使用','追问"帮我设计竞品动态周报的具体格式"']},

{id:'user-persona',category:'用户研究',title:'用户画像生成',desc:'输入产品信息，AI 生成详细的用户画像',level:'入门',
steps:[
{title:'你的产品是什么？',fields:[{key:'product',label:'产品描述',type:'textarea',placeholder:'如：一个面向独立设计师的项目管理工具'}]},
{title:'你的目标用户大致是谁？',fields:[{key:'target',label:'目标用户',type:'text',placeholder:'如：自由职业设计师、小团队负责人'}]},
{title:'用户会在什么场景下使用？',fields:[{key:'scenarios',type:'checkbox',options:['日常工作','项目管理','创意协作','远程办公','学习培训','个人兴趣'],defaults:['日常工作','项目管理']}]}
],
prompt:d=>`你是一个资深用户研究员，擅长构建用户画像。\n\n产品：${d.product}\n目标用户：${d.target}\n使用场景：\n${d.scenarios.map(v=>'· '+v).join('\n')}\n\n请生成 3 个详细的用户画像，每个包含：\n1. 基本信息（虚构但合理）\n2. 用户目标与痛点\n3. 使用行为特征\n4. 决策因素\n5. 典型的一天（Day in the Life）\n6. 对我们产品的期待与担忧`,
tips:['生成的画像可用于 PRD、设计评审和营销文案','追问"帮我补充用户获取渠道分析"']},

{id:'user-feedback',category:'用户研究',title:'用户反馈分析',desc:'粘贴用户反馈，AI 帮你提炼关键洞察',level:'入门',
steps:[
{title:'粘贴用户反馈',fields:[{key:'feedback',label:'用户反馈内容',type:'textarea',placeholder:'每条反馈一行，如：\n"导出功能太慢了"\n"希望支持暗色模式"\n"协作功能不够流畅"'}]},
{title:'你希望重点分析什么？',fields:[{key:'focus',type:'radio',options:['功能需求提炼','情感倾向分析','优先级排序','全部都分析'],defaults:'全部都分析'}]}
],
prompt:d=>`你是一个资深产品经理，擅长用户反馈分析。\n\n以下是收集到的用户反馈：\n${d.feedback}\n\n请进行分析，重点：${d.focus}\n\n请输出：\n1. 反馈总览\n2. 高频关键词提取\n3. 功能需求分类与优先级建议\n4. 正面反馈亮点\n5. 负面反馈痛点及根因分析\n6. 行动建议（短期 vs 长期）`,
tips:['反馈越多分析越准确，建议至少 10 条','追问"帮我设计一个用户反馈收集问卷"']},

{id:'user-churn',category:'用户研究',title:'用户流失分析',desc:'分析用户为什么离开，找到挽回策略',level:'进阶',
steps:[
{title:'你的产品是什么？',fields:[{key:'product',label:'产品描述',type:'text',placeholder:'如：在线教育平台，月费 99 元'}]},
{title:'你知道的流失情况',fields:[{key:'data',label:'流失数据',type:'textarea',placeholder:'如：月流失率约 8%，主要在第 7-14 天流失'}]},
{title:'你怀疑的流失原因',fields:[{key:'suspects',type:'checkbox',options:['新手指引不够','核心价值不明显','竞品更便宜','功能满足不了需求','使用频次低','付费门槛高'],defaults:['新手指引不够','核心价值不明显']}]}
],
prompt:d=>`你是一个资深增长产品经理，擅长用户留存和流失分析。\n\n产品：${d.product}\n\n流失数据：\n${d.data}\n\n怀疑的流失原因：\n${d.suspects.map(v=>'· '+v).join('\n')}\n\n请输出：\n1. 流失漏斗分析\n2. 流失用户画像特征\n3. 流失原因假设排序\n4. 验证假设的方案\n5. 挽回策略建议（按用户价值分层）\n6. 预防流失的长期策略`,
tips:['数据不多也没关系，AI 会基于常见模式给出分析框架','追问"帮我设计新用户 Onboarding 优化方案"']},

{id:'req-priority',category:'需求管理',title:'需求优先级排序',desc:'粘贴需求列表，AI 用专业框架帮你排序',level:'进阶',
steps:[
{title:'粘贴你的需求列表',fields:[{key:'requirements',label:'需求列表',type:'textarea',placeholder:'每行一个，如：\n1. 支持暗色模式\n2. 导出为 PDF\n3. 团队协作权限管理'}]},
{title:'选择排序框架',fields:[{key:'framework',type:'radio',options:['RICE（覆盖×影响×信心÷工作量）','ICE（影响×信心×难易度）','自定义权重'],defaults:'RICE（覆盖×影响×信心÷工作量）'}]}
],
prompt:d=>`你是一个资深产品经理，擅长需求管理和优先级决策。\n\n以下是我的需求列表：\n${d.requirements}\n\n请使用 ${d.framework} 框架帮我排序。\n\n请输出：\n1. 每个需求的框架评分明细（用表格）\n2. 排序结果（从高到低）\n3. 分为三档：立即做 / 计划做 / 暂缓\n4. 如果只能选 3 个，推荐哪 3 个？为什么？`,
tips:['需求描述越详细，排序越准确','追问"帮我补充每个需求的工作量估算"']},

{id:'prd-draft',category:'需求管理',title:'PRD 初稿生成',desc:'输入需求信息，AI 生成结构化 PRD 初稿',level:'进阶',
steps:[
{title:'你要做什么功能/产品？',fields:[{key:'requirement',label:'需求描述',type:'textarea',placeholder:'如：为项目管理工具增加甘特图功能，支持任务依赖关系可视化'}]},
{title:'谁会用这个功能？',fields:[{key:'users',label:'目标用户',type:'text',placeholder:'如：项目经理、团队负责人'}]},
{title:'关键功能点',fields:[{key:'features',label:'核心功能',type:'textarea',placeholder:'每行一个，如：\n任务时间线展示\n拖拽调整时间\n任务依赖连线'}]},
{title:'有什么约束条件？',fields:[{key:'constraints',type:'checkbox',options:['有上线时间要求','需要兼容旧版','有技术限制','需要考虑性能','需要多端适配','暂无特殊约束'],defaults:['暂无特殊约束']}]}
],
prompt:d=>`你是一个资深产品经理，擅长撰写 PRD。\n\n需求：${d.requirement}\n目标用户：${d.users}\n\n核心功能：\n${d.features.split('\n').filter(Boolean).map(v=>'· '+v).join('\n')}\n\n约束条件：\n${d.constraints.map(v=>'· '+v).join('\n')}\n\n请生成一份完整的 PRD 初稿：\n1. 文档概述（背景、目标、范围）\n2. 用户故事（User Stories）\n3. 功能需求详细说明\n4. 非功能需求\n5. 交互流程说明\n6. 数据需求\n7. 验收标准\n8. 上线计划建议`,
tips:['PRD 初稿需要根据实际情况调整完善','追问"帮我补充竞品在这方面的做法"']},

{id:'req-review',category:'需求管理',title:'需求评审模拟',desc:'AI 扮演评审专家，提前发现需求漏洞',level:'进阶',
steps:[
{title:'粘贴你的需求描述',fields:[{key:'requirement',label:'需求描述',type:'textarea',placeholder:'如：我们计划增加 AI 写作助手功能，用户输入主题自动生成文章大纲…'}]},
{title:'你希望从哪些角度评审？',fields:[{key:'angles',type:'checkbox',options:['完整性','可行性','用户价值','技术风险','边界条件','异常场景','性能影响','数据安全'],defaults:['完整性','可行性','用户价值','边界条件']}]}
],
prompt:d=>`你是一个严格但建设性的需求评审专家。请对以下需求进行评审：\n\n${d.requirement}\n\n评审角度：\n${d.angles.map(v=>'· '+v).join('\n')}\n\n请输出：\n1. 需求理解确认\n2. 发现的问题（P0 致命 / P1 重要 / P2 建议）\n3. 遗漏的场景和边界条件\n4. 潜在的技术风险\n5. 改进建议\n6. 评审结论：通过 / 有条件通过 / 需要修改`,

// ── APP ──────────────────────────────────────────────
let currentSkill=null, currentStep=0, formData={}, activeCategory='全部';

function toggleTheme(){
  document.body.classList.toggle('dark');
  document.querySelector('.theme-toggle').textContent=document.body.classList.contains('dark')?'☀️':'🌙';
  localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');
}
if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');document.querySelector('.theme-toggle').textContent='☀️';}

function init(){
  const cats=['全部',...new Set(skills.map(s=>s.category))];
  document.getElementById('cats').innerHTML=cats.map(c=>`<button class="cat-btn${c==='全部'?' active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
  filterCards();
}

function setCat(c){activeCategory=c;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.textContent===c));filterCards();}
function filterCards(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=skills.filter(s=>(activeCategory==='全部'||s.category===activeCategory)&&(s.title.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q)||s.category.toLowerCase().includes(q)));
  const grid=document.getElementById('grid');
  grid.innerHTML=filtered.length?filtered.map(s=>`<div class="card" onclick="openSkill('${s.id}')"><div class="cat-tag">${s.category}</div><h3>${s.title}</h3><div class="desc">${s.desc}</div><div class="meta"><span class="level">${s.level}</span><span>${s.steps.length} 个问题 → 生成 Prompt</span></div></div>`).join(''):'<div class="empty">没有找到匹配的场景</div>';
}

function openSkill(id){
  currentSkill=skills.find(s=>s.id===id);currentStep=0;formData={};
  // init defaults
  currentSkill.steps.forEach(step=>step.fields.forEach(f=>{
    if(f.type==='checkbox')formData[f.key]=[...(f.defaults||[])];
    else if(f.type==='radio')formData[f.key]=f.defaults||'';
    else formData[f.key]='';
  }));
  show('detail');hide('home');hide('result');renderStep();
}

function renderStep(){
  const s=currentSkill,step=s.steps[currentStep];
  const pct=((currentStep+1)/s.steps.length*100);
  document.getElementById('detail').innerHTML=`
    <button class="back-btn" onclick="goHome()">← 返回</button>
    <h2>${s.title}</h2>
    <div class="detail-desc">${s.desc}</div>
    <div class="step-indicator"><span class="current">第 ${currentStep+1} 步，共 ${s.steps.length} 步</span><div class="step-bar"><div class="fill" style="width:${pct}%"></div></div></div>
    <div class="step-title">${step.title}</div>
    ${step.fields.map(f=>renderField(f)).join('')}
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="prevStep()" ${currentStep===0?'disabled':''}>← 上一步</button>
      <button class="btn btn-primary" onclick="${currentStep===s.steps.length-1?'generate()':'nextStep()'}">${currentStep===s.steps.length-1?'生成 Prompt →':'下一步 →'}</button>
    </div>`;
}

function renderField(f){
  if(f.type==='text')return`<div class="field"><label>${f.label}</label><input type="text" value="${esc(formData[f.key])}" placeholder="${f.placeholder||''}" onchange="formData['${f.key}']=this.value"></div>`;
  if(f.type==='textarea')return`<div class="field"><label>${f.label}</label><textarea placeholder="${f.placeholder||''}" onchange="formData['${f.key}']=this.value">${esc(formData[f.key])}</textarea></div>`;
  if(f.type==='checkbox')return`<div class="field"><label>${f.label||''}</label><div class="tag-group">${f.options.map(o=>`<div class="tag-option${(formData[f.key]||[]).includes(o)?' selected':''}" onclick="toggleTag('${f.key}','${o}',this)">${o}</div>`).join('')}</div></div>`;
  if(f.type==='radio')return`<div class="field"><label>${f.label||''}</label><div class="tag-group">${f.options.map(o=>`<div class="tag-option${formData[f.key]===o?' selected':''}" onclick="setRadio('${f.key}','${o}',this)">${o}</div>`).join('')}</div></div>`;
  return'';
}

function toggleTag(key,val,el){if(!formData[key])formData[key]=[];const i=formData[key].indexOf(val);if(i>=0)formData[key].splice(i,1);else formData[key].push(val);el.classList.toggle('selected');}
function setRadio(key,val,el){formData[key]=val;el.parentElement.querySelectorAll('.tag-option').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');}
function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function nextStep(){currentStep++;renderStep();}
function prevStep(){currentStep--;renderStep();}

function generate(){
  const prompt=currentSkill.prompt(formData);
  show('result');hide('detail');hide('home');
  document.getElementById('result').innerHTML=`
    <div class="check">✅</div>
    <h2>你的专属 Prompt 已生成</h2>
    <div class="prompt-block"><pre>${esc(prompt)}</pre></div>
    <div class="result-actions">
      <button class="btn btn-primary" onclick="copyPrompt(this)">📋 复制到剪贴板</button>
      <button class="btn btn-secondary" onclick="backToForm()">✏️ 修改回答</button>
      <button class="btn btn-secondary" onclick="generate()">🔄 重新生成</button>
    </div>
    <div class="tips"><h4>💡 使用提示</h4><ul>${currentSkill.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
}

function copyPrompt(btn){
  const text=document.querySelector('.prompt-block pre').textContent;
  navigator.clipboard.writeText(text).then(()=>{btn.textContent='已复制 ✓';setTimeout(()=>btn.textContent='📋 复制到剪贴板',2000);});
}

function backToForm(){show('detail');hide('result');renderStep();}
function goHome(){currentSkill=null;show('home');hide('detail');hide('result');}
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

init();
</script>
</body>
</html>
